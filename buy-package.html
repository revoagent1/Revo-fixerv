<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Revo Fixer | Buy Package</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: #f0ebe3;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            color: #1e1e2a;
            padding: 16px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .header h1 { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .header h1 i { color: #6F8961; }
        .back-btn {
            background: rgba(255,255,255,0.4);
            border: 1px solid rgba(255,255,255,0.2);
            color: #888;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .card {
            background: rgba(255,255,255,0.45);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 20px;
            padding: 20px 18px;
            margin: 14px 0;
        }

        .pkg-summary {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }
        .pkg-summary .icon {
            width: 56px;
            height: 56px;
            background: rgba(111,137,97,0.05);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #6F8961;
        }
        .pkg-summary .info .name { font-size: 18px; font-weight: 700; }
        .pkg-summary .info .price { font-size: 14px; color: #6F8961; font-weight: 600; }
        .pkg-summary .info .duration { font-size: 11px; color: #999; }

        .method-tabs {
            display: flex;
            gap: 8px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 4px;
            margin-bottom: 16px;
        }
        .method-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            background: transparent;
            border: none;
            border-radius: 12px;
            color: #999;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        .method-tab.active {
            background: rgba(255,255,255,0.4);
            color: #1e1e2a;
        }
        .method-tab:hover:not(.active) { color: #666; }
        .method-tab i { margin-right: 6px; }

        .instruction-box {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .instruction-box i { color: #6F8961; font-size: 16px; }
        .instruction-box .text { font-size: 12px; color: #1e1e2a; font-weight: 500; }

        .address-box {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(74,158,255,0.08);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .address-box .addr {
            font-size: 12px;
            color: #6F8961;
            font-family: monospace;
            word-break: break-all;
            flex: 1;
        }
        .address-box .copy-btn {
            background: rgba(111,137,97,0.05);
            border: 1px solid rgba(111,137,97,0.08);
            color: #6F8961;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .address-box .copy-btn:hover { background: rgba(111,137,97,0.1); }

        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 10px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            color: #1e1e2a;
            font-size: 14px;
            outline: none;
        }
        .form-group input:focus {
            border-color: rgba(194,158,99,0.2);
            background: rgba(255,255,255,0.4);
        }

        .upload-container { margin-bottom: 16px; }
        .upload-container .label {
            display: block;
            font-size: 10px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
        }
        .upload-area {
            background: rgba(255,255,255,0.15);
            border: 2px dashed rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .upload-area:hover { border-color: rgba(111,137,97,0.25); background: rgba(255,255,255,0.25); }
        .upload-area .upload-icon { font-size: 32px; color: rgba(255,255,255,0.15); }
        .upload-area:hover .upload-icon { color: #6F8961; }
        .upload-area .upload-text { font-size: 12px; color: rgba(255,255,255,0.15); }
        .upload-area:hover .upload-text { color: #888; }
        .upload-area .upload-preview {
            width: 100%; max-height: 150px; object-fit: contain;
            border-radius: 10px; margin-top: 8px; display: none;
        }
        .upload-area .file-name {
            font-size: 11px; color: #6F8961;
            margin-top: 6px; display: none;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, #6F8961, #C29E63);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .btn-submit::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
            transition: left 0.6s ease;
        }
        .btn-submit:hover::before { left: 100%; }
        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(111,137,97,0.15);
        }
        .btn-submit:active { transform: scale(0.97); }
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-submit .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .btn-submit.loading .btn-text { display: none; }
        .btn-submit.loading .spinner { display: block; }

        .btn-submit.success {
            background: linear-gradient(135deg, #059669, #10b981) !important;
            animation: successPulse 0.6s ease;
        }
        @keyframes successPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .footer { text-align: center; margin-top: 18px; font-size: 8px; color: #ccc; }

        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            animation: rippleAnim 0.6s ease-out forwards;
            pointer-events: none;
            width: 40px;
            height: 40px;
            transform: translate(-50%, -50%);
        }
        @keyframes rippleAnim {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .btn-click { animation: btnPop 0.3s cubic-bezier(0.22, 1, 0.36, 1); }
        @keyframes btnPop {
            0% { transform: scale(1); }
            50% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }

        ::-webkit-scrollbar { width: 0; background: transparent; }

        @media (max-width: 400px) {
            .card { padding: 16px 14px; }
            .pkg-summary .info .name { font-size: 16px; }
            .header h1 { font-size: 17px; }
            .address-box { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fas fa-shopping-bag"></i>Buy Package</h1>
        <a href="packages.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
    </div>

    <div class="card">
        <!-- ===== PACKAGE SUMMARY ===== -->
        <div class="pkg-summary">
            <div class="icon"><i class="fas fa-bolt"></i></div>
            <div class="info">
                <div class="name" id="packageName">1 Hour Premium</div>
                <div class="price" id="packagePrice">₹2,000</div>
                <div class="duration" id="packageDuration">⏱️ 1 Hour Validity</div>
            </div>
        </div>

        <!-- ===== METHOD TABS ===== -->
        <div class="method-tabs">
            <button class="method-tab active" data-method="upi" onclick="selectMethod('upi', this)">
                <i class="fas fa-mobile-alt"></i> UPI
            </button>
            <button class="method-tab" data-method="bkash" onclick="selectMethod('bkash', this)">
                <i class="fas fa-credit-card"></i> Bkash
            </button>
            <button class="method-tab" data-method="usdt" onclick="selectMethod('usdt', this)">
                <i class="fas fa-coins"></i> USDT
            </button>
        </div>

        <!-- ===== UPI FORM ===== -->
        <div id="upiForm">
            <div class="instruction-box">
                <i class="fas fa-info-circle"></i>
                <span class="text" id="upiInstruction">Send Money to this UPI ID</span>
            </div>

            <div class="address-box">
                <span class="addr" id="upiAddress">Loading...</span>
                <button class="copy-btn" onclick="copyAddress('upi')">📋 Copy</button>
            </div>

            <div class="form-group"><label>💳 Your UPI ID</label><input type="text" id="upiId" placeholder="username@okhdfcbank"></div>
            <div class="form-group"><label>📝 Transaction ID / UTR</label><input type="text" id="upiTxnId" placeholder="Enter transaction ID"></div>
            <div class="form-group"><label>👤 Your Name</label><input type="text" id="upiName" placeholder="Enter your name"></div>
            <div class="form-group"><label>📱 Phone Number</label><input type="tel" id="upiPhone" placeholder="Enter phone number"></div>
        </div>

        <!-- ===== BKASH FORM ===== -->
        <div id="bkashForm" style="display:none;">
            <div class="instruction-box">
                <i class="fas fa-info-circle"></i>
                <span class="text" id="bkashInstruction">Send Money to this Bkash Number</span>
            </div>

            <div class="address-box">
                <span class="addr" id="bkashAddress">Loading...</span>
                <button class="copy-btn" onclick="copyAddress('bkash')">📋 Copy</button>
            </div>

            <div class="form-group"><label>📱 Your Bkash Number</label><input type="tel" id="bkashNumber" placeholder="01XXXXXXXXX"></div>
            <div class="form-group"><label>📝 Transaction ID / Reference</label><input type="text" id="bkashTxnId" placeholder="Enter transaction ID"></div>
            <div class="form-group"><label>👤 Your Name</label><input type="text" id="bkashName" placeholder="Enter your name"></div>
        </div>

        <!-- ===== USDT FORM ===== -->
        <div id="usdtForm" style="display:none;">
            <div class="instruction-box">
                <i class="fas fa-info-circle"></i>
                <span class="text" id="usdtInstruction">Send USDT to this Wallet Address</span>
            </div>

            <div class="address-box">
                <span class="addr" id="usdtAddress">Loading...</span>
                <button class="copy-btn" onclick="copyAddress('usdt')">📋 Copy</button>
            </div>

            <div class="form-group"><label>📝 Transaction ID</label><input type="text" id="usdtTxnId" placeholder="Enter transaction ID"></div>
            <div class="form-group"><label>👤 Your Name</label><input type="text" id="usdtName" placeholder="Enter your name"></div>
        </div>

        <!-- ===== UPLOAD SCREENSHOT ===== -->
        <div class="upload-container">
            <div class="label"><i class="fas fa-camera"></i> Upload Screenshot</div>
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon"><i class="fas fa-cloud-upload-alt"></i></div>
                <div class="upload-text">Tap to upload payment screenshot</div>
                <div style="font-size:10px;color:rgba(255,255,255,0.08);margin-top:4px;">PNG, JPG or WEBP • Max 5MB</div>
                <img class="upload-preview" id="uploadPreview">
                <div class="file-name" id="fileName"><i class="fas fa-check-circle"></i> <span id="fileLabel">File uploaded</span></div>
            </div>
            <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="previewImage(event)">
        </div>

        <button class="btn-submit" id="submitBtn" onclick="submitPayment()">
            <span class="btn-text"><i class="fas fa-check-circle"></i> Submit Payment</span>
            <span class="spinner"></span>
        </button>
    </div>

    <div class="footer">REVO FIXER © 2026</div>

    <script>
        // ============================================================
        // 🔥 FIREBASE CONFIG
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyCLz9LCMNsfb7tHJ2t-oocGjVD-nVox3GM",
            authDomain: "revo-fixer-45a26.firebaseapp.com",
            databaseURL: "https://revo-fixer-45a26-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "revo-fixer-45a26",
            storageBucket: "revo-fixer-45a26.firebasestorage.app",
            messagingSenderId: "496963115399",
            appId: "1:496963115399:web:d38ec404edff64dfecdb22"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ============================================================
        // 👤 CHECK USER
        // ============================================================
        const userId = localStorage.getItem('userId');
        if (!userId) {
            alert('⚠️ Please login first! Redirecting...');
            window.location.href = 'index.html';
        }

        // ============================================================
        // 📦 LOAD PACKAGE INFO
        // ============================================================
        const pkgName = localStorage.getItem('selectedPackage') || '1 Hour Premium';
        const pkgPrice = localStorage.getItem('selectedPrice') || '2000';
        const pkgHours = localStorage.getItem('selectedHours') || '1';

        document.getElementById('packageName').textContent = pkgName;
        document.getElementById('packagePrice').textContent = '₹' + parseInt(pkgPrice).toLocaleString();
        document.getElementById('packageDuration').textContent = '⏱️ ' + pkgHours + ' Hour' + (pkgHours > 1 ? 's' : '') + ' Validity';

        // ============================================================
        // ☁️ CLOUDINARY CONFIG
        // ============================================================
        const CLOUDINARY = {
            cloudName: 'dw72p48ir',
            uploadPreset: 'darkblaise_uploads',
            folder: 'revo-fixer-payments'
        };

        // ============================================================
        // 📤 CLOUDINARY UPLOAD
        // ============================================================
        async function uploadToCloudinary(file, subFolder = '') {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', CLOUDINARY.uploadPreset);
            const folderPath = subFolder ? `${CLOUDINARY.folder}/${subFolder}` : CLOUDINARY.folder;
            formData.append('folder', folderPath);

            const response = await fetch(
                `https://api.cloudinary.com/v1_1/${CLOUDINARY.cloudName}/image/upload`,
                { method: 'POST', body: formData }
            );
            const data = await response.json();
            if (data.error) throw new Error(data.error.message);
            return data.secure_url;
        }

        // ============================================================
        // 📤 UPLOAD SCREENSHOT
        // ============================================================
        async function uploadScreenshot(file) {
            if (!file) return null;
            if (file.size > 5 * 1024 * 1024) { alert('File size must be less than 5MB!'); return null; }
            if (!file.type.startsWith('image/')) { alert('Please select an image file!'); return null; }
            try {
                return await uploadToCloudinary(file, 'payment-screenshots');
            } catch (error) {
                alert('❌ Error uploading screenshot: ' + error.message);
                return null;
            }
        }

        // ============================================================
        // 📥 LOAD PAYMENT METHODS
        // ============================================================
        function loadPaymentMethods() {
            // UPI
            db.ref('paymentMethods/upi/numbers').once('value').then(snap => {
                const data = snap.val();
                if (data) {
                    const active = Object.values(data).find(n => n.isActive !== false);
                    if (active) {
                        document.getElementById('upiAddress').textContent = active.number;
                        document.getElementById('upiInstruction').textContent = active.instruction || 'Send Money to this UPI ID';
                    } else {
                        document.getElementById('upiAddress').textContent = 'No active UPI';
                        document.getElementById('upiInstruction').textContent = 'No UPI configured';
                    }
                } else {
                    document.getElementById('upiAddress').textContent = 'No UPI configured';
                    document.getElementById('upiInstruction').textContent = 'No UPI configured';
                }
            });

            // Bkash
            db.ref('paymentMethods/bkash/numbers').once('value').then(snap => {
                const data = snap.val();
                if (data) {
                    const active = Object.values(data).find(n => n.isActive !== false);
                    if (active) {
                        document.getElementById('bkashAddress').textContent = active.number;
                        document.getElementById('bkashInstruction').textContent = active.instruction || 'Send Money to this Bkash Number';
                    } else {
                        document.getElementById('bkashAddress').textContent = 'No active Bkash';
                        document.getElementById('bkashInstruction').textContent = 'No Bkash configured';
                    }
                } else {
                    document.getElementById('bkashAddress').textContent = 'No Bkash configured';
                    document.getElementById('bkashInstruction').textContent = 'No Bkash configured';
                }
            });

            // USDT
            db.ref('paymentMethods/usdt/numbers').once('value').then(snap => {
                const data = snap.val();
                if (data) {
                    const active = Object.values(data).find(n => n.isActive !== false);
                    if (active) {
                        document.getElementById('usdtAddress').textContent = active.number;
                        document.getElementById('usdtInstruction').textContent = active.instruction || 'Send USDT to this Wallet Address';
                    } else {
                        document.getElementById('usdtAddress').textContent = 'No active USDT';
                        document.getElementById('usdtInstruction').textContent = 'No USDT configured';
                    }
                } else {
                    document.getElementById('usdtAddress').textContent = 'No USDT configured';
                    document.getElementById('usdtInstruction').textContent = 'No USDT configured';
                }
            });
        }

        // ============================================================
        // 📋 COPY ADDRESS
        // ============================================================
        function copyAddress(method) {
            let text = '';
            if (method === 'upi') text = document.getElementById('upiAddress').textContent;
            else if (method === 'bkash') text = document.getElementById('bkashAddress').textContent;
            else text = document.getElementById('usdtAddress').textContent;

            if (!text || text === 'Loading...' || text.includes('No active')) {
                alert('Address not available!');
                return;
            }

            navigator.clipboard.writeText(text).then(() => {
                alert('✅ Address copied!');
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                alert('✅ Address copied!');
            });
        }

        // ============================================================
        // 🔄 SELECT METHOD
        // ============================================================
        let currentMethod = 'upi';

        function selectMethod(method, element) {
            currentMethod = method;
            document.querySelectorAll('.method-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.method === method);
            });
            document.getElementById('upiForm').style.display = method === 'upi' ? 'block' : 'none';
            document.getElementById('bkashForm').style.display = method === 'bkash' ? 'block' : 'none';
            document.getElementById('usdtForm').style.display = method === 'usdt' ? 'block' : 'none';
        }

        // ============================================================
        // 📷 PREVIEW IMAGE
        // ============================================================
        let selectedFile = null;

        function previewImage(event) {
            const file = event.target.files[0];
            if (!file) return;
            selectedFile = file;
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('uploadPreview').src = e.target.result;
                document.getElementById('uploadPreview').style.display = 'block';
                document.querySelector('.upload-area .upload-text').textContent = 'Click to change screenshot';
                document.getElementById('fileName').style.display = 'block';
                document.getElementById('fileLabel').textContent = file.name;
            };
            reader.readAsDataURL(file);
        }

        // ============================================================
        // 📤 SUBMIT PAYMENT
        // ============================================================
        async function submitPayment() {
            if (!userId) {
                alert('Please login first!');
                window.location.href = 'index.html';
                return;
            }

            let data = {
                method: currentMethod,
                userId: userId,
                packageName: pkgName,
                packagePrice: parseInt(pkgPrice),
                packageHours: parseInt(pkgHours),
                status: 'pending',
                createdAt: Date.now()
            };

            // Validation
            if (currentMethod === 'upi') {
                const upiId = document.getElementById('upiId').value.trim();
                const txnId = document.getElementById('upiTxnId').value.trim();
                const name = document.getElementById('upiName').value.trim();
                const phone = document.getElementById('upiPhone').value.trim();

                if (!upiId || !txnId || !name || !phone) {
                    alert('Please fill all fields!');
                    return;
                }
                data.userUpiId = upiId;
                data.transactionId = txnId;
                data.userName = name;
                data.userPhone = phone;

            } else if (currentMethod === 'bkash') {
                const number = document.getElementById('bkashNumber').value.trim();
                const txnId = document.getElementById('bkashTxnId').value.trim();
                const name = document.getElementById('bkashName').value.trim();

                if (!number || !txnId || !name) {
                    alert('Please fill all fields!');
                    return;
                }
                data.userBkashNumber = number;
                data.transactionId = txnId;
                data.userName = name;

            } else if (currentMethod === 'usdt') {
                const txnId = document.getElementById('usdtTxnId').value.trim();
                const name = document.getElementById('usdtName').value.trim();

                if (!txnId || !name) {
                    alert('Please fill all fields!');
                    return;
                }
                data.transactionId = txnId;
                data.userName = name;
            }

            if (!selectedFile) {
                alert('Please upload a payment screenshot!');
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.classList.add('loading');
            btn.disabled = true;

            try {
                // 🔥 Upload screenshot to Cloudinary
                const screenshotUrl = await uploadScreenshot(selectedFile);
                if (!screenshotUrl) {
                    btn.classList.remove('loading');
                    btn.disabled = false;
                    return;
                }
                data.screenshot = screenshotUrl;

                // Save to Firebase
                const newRef = await db.ref('paymentRequests').push(data);

                // 🔔 Admin notification
                await db.ref('adminNotifications').push({
                    userId: userId,
                    userName: data.userName || 'User',
                    type: 'package_request',
                    title: '📦 New Package Request',
                    message: `${data.userName || 'User'} purchased ${pkgName} for ₹${parseInt(pkgPrice).toLocaleString()}`,
                    requestId: newRef.key,
                    read: false,
                    timestamp: Date.now()
                });

                // 📝 Activity log
                await db.ref(`users/${userId}/activity`).push({
                    text: `📦 Package purchase request: ${pkgName} - ₹${parseInt(pkgPrice).toLocaleString()}`,
                    time: Date.now()
                });

                // Success
                btn.classList.remove('loading');
                btn.classList.add('success');
                btn.innerHTML = '<span class="btn-text"><i class="fas fa-check"></i> Submitted!</span>';
                btn.disabled = false;

                alert('✅ Payment request submitted! Admin will verify and activate your package.');

                localStorage.removeItem('selectedPackage');
                localStorage.removeItem('selectedPrice');
                localStorage.removeItem('selectedHours');

                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 2000);

            } catch (error) {
                console.error('Submit error:', error);
                btn.classList.remove('loading');
                btn.classList.remove('success');
                btn.disabled = false;
                btn.innerHTML = '<span class="btn-text"><i class="fas fa-check-circle"></i> Submit Payment</span>';
                alert('❌ Error: ' + error.message);
            }
        }

        // ============================================================
        // 🚀 INIT
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🛒 Buy Package page loaded!');
            loadPaymentMethods();
            selectMethod('upi', document.querySelector('.method-tab.active'));
        });
    </script>

</body>
</html>
