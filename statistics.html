<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: #f0ebe3;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            color: #1e1e2a;
            padding: 16px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .header h1 { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .header h1 i { color: #6F8961; font-size: 22px; }
        .back-btn {
            background: rgba(255,255,255,0.4);
            border: 1px solid rgba(255,255,255,0.2);
            color: #888;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .card {
            background: rgba(255,255,255,0.45);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 20px;
            padding: 20px 18px;
            margin: 14px 0;
        }

        /* ===== COMING SOON ===== */
        .coming-soon {
            text-align: center;
            padding: 40px 20px;
        }
        .coming-soon .icon {
            font-size: 64px;
            color: #6F8961;
            margin-bottom: 16px;
            animation: pulseIcon 2s ease-in-out infinite;
        }
        @keyframes pulseIcon {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.7; }
        }
        .coming-soon h2 {
            font-size: 24px;
            font-weight: 700;
            color: #1e1e2a;
            margin-bottom: 8px;
        }
        .coming-soon h2 span { color: #C29E63; }
        .coming-soon p {
            font-size: 14px;
            color: #999;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .btn-telegram {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 32px;
            background: linear-gradient(135deg, #0088cc, #006699);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s ease;
            text-decoration: none;
        }
        .btn-telegram:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 136, 204, 0.2);
        }

        .footer { text-align: center; margin-top: 18px; font-size: 8px; color: #ccc; }

        ::-webkit-scrollbar { width: 0; background: transparent; }

        @media (max-width: 400px) {
            .card { padding: 16px 14px; }
            .coming-soon .icon { font-size: 48px; }
            .coming-soon h2 { font-size: 20px; }
            .header h1 { font-size: 17px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fas fa-chart-bar"></i>Live Stats</h1>

    <div class="card">

                <i class="fab fa-telegram"></i> Join Telegram Channel
            </a>
        </div>
    </div>

    <div class="footer">REVO FIXER © 2026</div>
