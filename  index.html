<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Revo Fixer | Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0a0a1a;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #fff;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        body::before,
        body::after {
            content: "";
            position: absolute;
            width: 420px;
            height: 420px;
            border-radius: 50%;
            filter: blur(120px);
            animation: floatBlob 12s ease-in-out infinite alternate;
            z-index: 0;
        }
        body::before {
            background: #0d2b4a;
            left: -120px;
            top: -120px;
        }
        body::after {
            background: #1a3a6a;
            right: -120px;
            bottom: -120px;
        }
        @keyframes floatBlob {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(80px, 60px) scale(1.3); }
        }

        .wrap {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 400px;
            animation: fadeUp 0.6s ease-out;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 28px;
            padding: 32px 28px;
            transition: all 0.4s ease;
        }
        .card:hover {
            border-color: rgba(255, 255, 255, 0.08);
        }

        /* ===== LOGO ===== */
        .logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .logo .logo-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(74, 158, 255, 0.1);
            margin-bottom: 14px;
            transition: all 0.4s ease;
            display: inline-block;
        }
        .logo .logo-img:hover {
            transform: scale(1.05);
            border-color: rgba(74, 158, 255, 0.3);
        }
        .logo .logo-img-fallback {
            display: none;
            font-size: 44px;
            color: #4a9eff;
            background: rgba(74, 158, 255, 0.05);
            padding: 18px;
            border-radius: 50%;
            border: 1px solid rgba(74, 158, 255, 0.05);
            transition: all 0.4s ease;
            width: 80px;
            height: 80px;
            align-items: center;
            justify-content: center;
            margin: 0 auto 14px;
        }
        .logo .logo-img-fallback:hover {
            transform: scale(1.05) rotate(-5deg);
            border-color: rgba(74, 158, 255, 0.15);
        }
        .logo .logo-img-fallback i {
            font-size: 36px;
        }
        .logo h1 {
            font-size: 26px;
            font-weight: 800;
            margin-top: 12px;
            letter-spacing: -0.5px;
            color: #fff;
        }
        .logo h1 span {
            color: #4a9eff;
        }
        .logo p {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 5px;
            margin-top: 4px;
        }

        /* ===== INPUT ===== */
        .input-group {
            margin-bottom: 18px;
        }
        .input-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.35);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .input-group .input-wrap {
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            padding: 4px;
            transition: all 0.4s ease;
        }
        .input-group .input-wrap:focus-within {
            border-color: rgba(74, 158, 255, 0.2);
            background: rgba(255, 255, 255, 0.03);
            box-shadow: 0 0 30px rgba(74, 158, 255, 0.02);
        }
        .input-group .input-wrap input {
            flex: 1;
            padding: 14px 16px;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1px;
        }
        .input-group .input-wrap input::placeholder {
            color: rgba(255, 255, 255, 0.1);
            font-weight: 400;
            letter-spacing: 0px;
        }
        .input-group .input-wrap button {
            background: rgba(255, 255, 255, 0.02);
            border: none;
            border-radius: 12px;
            padding: 0 18px;
            color: rgba(255, 255, 255, 0.15);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            min-width: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .input-group .input-wrap button:hover {
            color: #4a9eff;
            background: rgba(74, 158, 255, 0.05);
        }

        /* ===== BUTTONS ===== */
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            margin-bottom: 10px;
            position: relative;
            overflow: hidden;
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            transition: left 0.6s;
        }
        .btn:hover::before {
            left: 100%;
        }

        .btn-click {
            animation: btnPop 0.3s cubic-bezier(0.22, 1, 0.36, 1);
        }
        @keyframes btnPop {
            0% { transform: scale(1); }
            50% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }

        .btn-primary {
            background: linear-gradient(135deg, #1a4a8a, #2a6aba);
            color: #fff;
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(26, 74, 138, 0.3);
        }
        .btn-primary:active {
            transform: scale(0.97);
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.4);
        }
        .btn-outline:hover {
            border-color: rgba(74, 158, 255, 0.1);
            background: rgba(74, 158, 255, 0.02);
            color: #7abfff;
            transform: translateY(-2px);
        }

        .btn-telegram {
            background: rgba(0, 136, 204, 0.05);
            border: 1px solid rgba(0, 136, 204, 0.1);
            color: #38bdf8;
        }
        .btn-telegram:hover {
            background: rgba(0, 136, 204, 0.08);
            border-color: rgba(0, 136, 204, 0.15);
            transform: translateY(-2px);
        }

        .footer {
            text-align: center;
            margin-top: 18px;
            font-size: 8px;
            color: rgba(255, 255, 255, 0.04);
            letter-spacing: 3px;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            padding: 12px 24px;
            border-radius: 14px;
            font-size: 12px;
            font-weight: 600;
            z-index: 9999;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            pointer-events: none;
            background: rgba(10, 10, 26, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast-success {
            color: #34d399;
            border-color: rgba(52, 211, 153, 0.1);
        }
        .toast-error {
            color: #f87171;
            border-color: rgba(248, 113, 113, 0.1);
        }

        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .btn.loading .btn-text { display: none; }
        .btn.loading .spinner { display: block; }

        @media (max-width: 400px) {
            .card { padding: 24px 18px; }
            .logo h1 { font-size: 22px; }
            .logo .logo-img { width: 60px; height: 60px; }
        }
    </style>
</head>
<body>

    <div class="toast" id="toast"></div>

    <div class="wrap">
        <div class="card">

            <!-- ===== LOGO ===== -->
            <div class="logo">
                <!-- 
                    🔥 আপনার NEW GitHub লোগো URL এখানে বসান 
                    ফরমেট: https://raw.githubusercontent.com/USERNAME/REPO-NAME/BRANCH/FILE-PATH
                -->
                <img src="https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/assets/images/logo.png" 
                     alt="Logo" 
                     class="logo-img" 
                     onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='flex';">
                
                <!-- 🎨 ব্যাকআপ আইকন -->
                <div class="logo-img-fallback" id="logoFallback">
                    <i class="fas fa-bolt"></i>
                </div>
                
                <h1>REVO <span>FIXER</span></h1>
                <p>CRAZY TIME REVO</p>
            </div>

            <!-- ===== INPUT ===== -->
            <div class="input-group">
                <label>🔑 License Key</label>
                <div class="input-wrap">
                    <input type="password" id="licenseKey" placeholder="XXXX-XXXX-XXXX-XXXX" maxlength="25">
                    <button id="pasteBtn" onclick="pasteKey()"><i class="fas fa-paste"></i></button>
                </div>
            </div>

            <!-- ===== BUTTONS ===== -->
            <button class="btn btn-primary" id="activateBtn" onclick="login()">
                <span class="btn-text"><i class="fas fa-key"></i> Activate License</span>
                <span class="spinner"></span>
            </button>

            <button class="btn btn-outline" id="buyBtn" onclick="buyLicense()">
                <i class="fas fa-shopping-cart"></i> Buy License
            </button>

            <button class="btn btn-telegram" id="supportBtn" onclick="openSupport()">
                <i class="fab fa-telegram"></i> Support
            </button>

            <div class="footer">REVO FIXER © 2026</div>
        </div>
    </div>

    <script>
        // ============================================================
        // 🔥 FIREBASE CONFIG - আপনার NEW Firebase Project এর Config দিন
        // ============================================================
        const firebaseConfig = {
            apiKey: "YOUR_NEW_API_KEY",
            authDomain: "YOUR_NEW_PROJECT.firebaseapp.com",
            databaseURL: "https://YOUR_NEW_PROJECT-default-rtdb.firebaseio.com",
            projectId: "YOUR_NEW_PROJECT",
            storageBucket: "YOUR_NEW_PROJECT.firebasestorage.app",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_NEW_APP_ID"
        };

        // ============================================================
        // 🚀 FIREBASE INITIALIZE
        // ============================================================
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ============================================================
        // 🔗 TELEGRAM LINK - Firebase থেকে নেওয়া
        // ============================================================
        let telegramLink = 'https://t.me/+CNJHfpdP1ck0NDA1'; // Default

        function loadTelegramLink() {
            db.ref('appSettings/telegramLink').once('value')
                .then((snapshot) => {
                    if (snapshot.exists()) {
                        telegramLink = snapshot.val();
                        console.log('✅ Telegram Link loaded:', telegramLink);
                    } else {
                        // Default link use করবে
                        console.log('ℹ️ No custom link found, using default');
                    }
                })
                .catch((error) => {
                    console.error('❌ Error loading Telegram link:', error);
                });
        }

        // ============================================================
        // 📱 DEVICE INFO
        // ============================================================
        function getDeviceInfo() {
            let deviceId = localStorage.getItem('deviceId');
            if (!deviceId) {
                deviceId = 'device_' + Date.now() + '_' + Math.random().toString(36).substring(2, 10);
                localStorage.setItem('deviceId', deviceId);
            }

            const userAgent = navigator.userAgent;
            let deviceName = 'Unknown Device';
            let deviceModel = 'Unknown Model';
            let deviceBrand = 'Unknown Brand';
            let os = 'Unknown OS';

            if (/android/i.test(userAgent)) {
                deviceBrand = 'Android';
                const match = userAgent.match(/; (.*?) Build\//);
                if (match) deviceModel = match[1];
                deviceName = 'Android Phone';
            } else if (/iPhone|iPad|iPod/i.test(userAgent)) {
                deviceBrand = 'Apple';
                deviceModel = /iPhone|iPad|iPod/.exec(userAgent)?.[0] || 'iOS Device';
                deviceName = /iPhone/.test(userAgent) ? 'iPhone' : /iPad/.test(userAgent) ? 'iPad' : 'iOS Device';
            } else if (/Windows/i.test(userAgent)) {
                deviceBrand = 'Windows';
                deviceModel = 'PC';
                deviceName = 'Windows PC';
            } else if (/Macintosh/i.test(userAgent)) {
                deviceBrand = 'Apple';
                deviceModel = 'Mac';
                deviceName = 'Mac';
            } else if (/Linux/i.test(userAgent)) {
                deviceBrand = 'Linux';
                deviceModel = 'PC';
                deviceName = 'Linux PC';
            }

            if (/Windows NT 10.0/i.test(userAgent)) os = 'Windows 10/11';
            else if (/Windows NT 6.1/i.test(userAgent)) os = 'Windows 7';
            else if (/Mac OS X/i.test(userAgent)) os = 'macOS';
            else if (/Android/i.test(userAgent)) os = 'Android';
            else if (/iPhone|iPad/i.test(userAgent)) os = 'iOS';
            else if (/Linux/i.test(userAgent)) os = 'Linux';

            return {
                deviceId: deviceId,
                deviceName: deviceName,
                deviceModel: deviceModel || 'Unknown',
                deviceBrand: deviceBrand || 'Unknown',
                os: os || 'Unknown',
                browser: userAgent,
                screenWidth: window.screen.width,
                screenHeight: window.screen.height,
                language: navigator.language || 'en',
                installedAt: Date.now(),
                lastActive: Date.now()
            };
        }

        async function saveDeviceInfo(userId) {
            try {
                const deviceInfo = getDeviceInfo();
                await db.ref(`users/${userId}/devices/${deviceInfo.deviceId}`).set(deviceInfo);
                console.log('✅ Device info saved:', deviceInfo);
                return true;
            } catch (error) {
                console.error('❌ Failed to save device info:', error);
                return false;
            }
        }

        // ============================================================
        // 📋 PASTE FUNCTION
        // ============================================================
        function pasteKey() {
            const btn = document.getElementById('pasteBtn');
            btn.classList.remove('btn-click');
            void btn.offsetWidth;
            btn.classList.add('btn-click');

            const input = document.getElementById('licenseKey');

            if (navigator.clipboard && navigator.clipboard.readText) {
                navigator.clipboard.readText()
                    .then(text => {
                        if (text && text.trim()) {
                            input.value = text.trim().toUpperCase();
                            showToast('✅ License key pasted!');
                        } else {
                            showToast('❌ Clipboard is empty', true);
                        }
                    })
                    .catch(err => {
                        console.warn('Clipboard API failed:', err);
                        showToast('📋 Please press Ctrl+V to paste', false);
                        input.focus();
                        input.select();
                    });
            } else {
                showToast('📋 Please press Ctrl+V to paste', false);
                input.focus();
                input.select();
            }
        }

        document.getElementById('licenseKey').addEventListener('paste', function(e) {
            setTimeout(() => {
                const val = this.value.trim();
                if (val) {
                    showToast('✅ License key pasted!');
                }
            }, 100);
        });

        // ============================================================
        // 🎬 BUTTON CLICK ANIMATION
        // ============================================================
        function animateButton(btnId) {
            const btn = document.getElementById(btnId);
            if (btn) {
                btn.classList.remove('btn-click');
                void btn.offsetWidth;
                btn.classList.add('btn-click');
            }
        }

        // ============================================================
        // 📞 SUPPORT BUTTON
        // ============================================================
        function openSupport() {
            animateButton('supportBtn');
            setTimeout(() => {
                window.open(telegramLink, '_blank');
            }, 200);
        }

        // ============================================================
        // 🛒 BUY LICENSE
        // ============================================================
        function buyLicense() {
            animateButton('buyBtn');
            setTimeout(() => {
                window.location.href = 'packages.html';
            }, 200);
        }

        // ============================================================
        // 🔐 LOGIN FUNCTION
        // ============================================================
        async function login() {
            const key = document.getElementById('licenseKey').value.trim().toUpperCase();
            if (!key) {
                showToast('Please enter license key!', true);
                return;
            }

            const btn = document.getElementById('activateBtn');
            btn.classList.add('loading');
            btn.disabled = true;
            animateButton('activateBtn');

            try {
                // 🔥 আপনার লগইন লজিক এখানে বসবে
                const userId = 'user_' + Date.now();

                await saveDeviceInfo(userId);

                await db.ref(`users/${userId}/activity`).push({
                    text: `✅ Login successful from ${getDeviceInfo().deviceName}`,
                    time: Date.now()
                });

                btn.classList.remove('loading');
                btn.disabled = false;
                showToast('🔐 License activated!');

                setTimeout(() => {
                    // window.location.href = 'dashboard.html';
                }, 1500);

            } catch (error) {
                console.error('❌ Login error:', error);
                btn.classList.remove('loading');
                btn.disabled = false;
                showToast('❌ Error: ' + error.message, true);
            }
        }

        // ============================================================
        // 💬 TOAST
        // ============================================================
        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = isError ? 'toast toast-error show' : 'toast toast-success show';
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ============================================================
        // ⌨️ ENTER KEY SUPPORT
        // ============================================================
        document.getElementById('licenseKey').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });

        // ============================================================
        // 🚀 PAGE LOAD
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            // লোগো চেক
            const img = document.querySelector('.logo-img');
            if (img) {
                img.onerror = function() {
                    this.style.display = 'none';
                    document.getElementById('logoFallback').style.display = 'flex';
                };
            }
            
            loadTelegramLink();
            console.log('🚀 Login page loaded with NEW Config!');
        });
    </script>

</body>
</html>
