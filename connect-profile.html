<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Revo Fixer | Connect Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #f0ebe3;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            color: #1e1e2a;
            position: relative;
            overflow-x: hidden;
            padding: 16px;
        }

        .bg-effect {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at 20% 50%, rgba(111, 137, 97, 0.04), transparent 50%),
                        radial-gradient(ellipse at 80% 30%, rgba(194, 158, 99, 0.03), transparent 40%),
                        radial-gradient(ellipse at 50% 80%, rgba(111, 137, 97, 0.02), transparent 30%);
            animation: bgFloat 20s ease-in-out infinite;
        }
        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
            33% { transform: translate(2%, -2%) rotate(2deg) scale(1.02); }
            66% { transform: translate(-1%, 1%) rotate(-1deg) scale(0.98); }
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            pointer-events: none;
            opacity: 0.15;
            animation: orbFloat 25s ease-in-out infinite;
        }
        .orb-1 { width: 400px; height: 400px; background: #6F8961; top: -100px; right: -100px; animation-delay: 0s; }
        .orb-2 { width: 300px; height: 300px; background: #C29E63; bottom: -80px; left: -80px; animation-delay: -8s; }
        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(40px, -30px) scale(1.1); }
            66% { transform: translate(-30px, 20px) scale(0.9); }
        }

        .wrap { position: relative; z-index: 1; max-width: 420px; margin: 0 auto; padding: 10px 0 30px; }

        /* ============================================================
                   ANIMATIONS
                   ============================================================ */
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(25px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
        @keyframes btnRipple { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
        @keyframes btnPop { 0% { transform: scale(1); } 50% { transform: scale(0.95); } 100% { transform: scale(1); } }
        @keyframes spinLoading { to { transform: rotate(360deg); } }

        /* ============================================================
                   HEADER
                   ============================================================ */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            animation: slideDown 0.7s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .header h1 {
            font-size: 20px;
            font-weight: 700;
            color: #1e1e2a;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header h1 i { color: #6F8961; font-size: 22px; }
        .header .back-btn {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #888;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.4s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header .back-btn:hover {
            border-color: rgba(194, 158, 99, 0.15);
            color: #1e1e2a;
            background: rgba(255, 255, 255, 0.7);
            transform: translateY(-2px);
        }

        /* ============================================================
                   CARD
                   ============================================================ */
        .card {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 20px;
            padding: 20px 18px;
            margin: 14px 0;
            transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) backwards;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            position: relative;
            overflow: hidden;
        }
        .card:hover {
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.04);
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.6);
        }

        /* ============================================================
                   CONNECTED INFO
                   ============================================================ */
        .connected-info {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .connected-info .title {
            font-size: 10px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 500;
            margin-bottom: 10px;
        }
        .connected-info .title i { color: #6F8961; margin-right: 4px; }
        .connected-info .item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin-bottom: 6px;
            font-size: 13px;
            color: #1e1e2a;
        }
        .connected-info .item:last-child { margin-bottom: 0; }
        .connected-info .item i { color: #34d399; font-size: 14px; width: 20px; }
        .connected-info .empty {
            text-align: center;
            padding: 16px;
            color: #bbb;
            font-size: 12px;
        }
        .connected-info .empty i {
            display: block;
            font-size: 28px;
            margin-bottom: 6px;
            color: #ccc;
        }

        /* ============================================================
                   FORM
                   ============================================================ */
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 10px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
        }
        .form-group label i { color: #6F8961; margin-right: 4px; }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: #1e1e2a;
            font-size: 14px;
            outline: none;
            transition: all 0.4s ease;
            font-family: 'Inter', sans-serif;
        }
        .form-group input:focus {
            border-color: rgba(194, 158, 99, 0.2);
            background: rgba(255, 255, 255, 0.4);
        }
        .form-group input::placeholder { color: #bbb; }

        /* ============================================================
                   BUTTONS
                   ============================================================ */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.06), transparent);
            transition: left 0.6s ease;
        }
        .btn:hover::before { left: 100%; }
        .btn:hover {
            transform: translateY(-3px);
        }
        .btn:active { transform: scale(0.97); }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6F8961, #C29E63);
            color: #fff;
        }
        .btn-primary:hover {
            box-shadow: 0 8px 30px rgba(111, 137, 97, 0.15);
        }

        .btn-danger {
            background: transparent;
            border: 1px solid rgba(220, 53, 69, 0.15);
            color: #dc3545;
            margin-top: 8px;
        }
        .btn-danger:hover {
            background: rgba(220, 53, 69, 0.05);
            border-color: rgba(220, 53, 69, 0.25);
        }

        .btn .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spinLoading 0.7s linear infinite;
            margin: 0 auto;
        }
        .btn.loading .btn-text { display: none; }
        .btn.loading .spinner { display: block; }

        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            animation: btnRipple 0.6s ease-out forwards;
            pointer-events: none;
            width: 40px;
            height: 40px;
            transform: translate(-50%, -50%);
        }
        .btn-click { animation: btnPop 0.3s cubic-bezier(0.22, 1, 0.36, 1); }

        .footer {
            text-align: center;
            margin-top: 18px;
            font-size: 8px;
            color: #ccc;
            letter-spacing: 3px;
        }

        ::-webkit-scrollbar { width: 0; background: transparent; }

        @media (max-width: 400px) {
            .wrap { padding: 6px 0; }
            .card { padding: 16px 14px; }
            .header h1 { font-size: 17px; }
        }
    </style>
</head>
<body>

    <div class="bg-effect"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="wrap">

        <!-- ===== HEADER ===== -->
        <div class="header">
            <h1><i class="fas fa-link"></i>Connect Profile</h1>
            <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
        </div>

        <!-- ===== CURRENT CONNECTION ===== -->
        <div class="card">
            <div class="connected-info">
                <div class="title"><i class="fas fa-check-circle"></i>Connected Account</div>
                <div id="connectedInfo">
                    <div class="empty">
                        <i class="fas fa-user-slash"></i>
                        No account connected
                    </div>
                </div>
            </div>
        </div>

        <!-- ===== CONNECT FORM ===== -->
        <div class="card">
            <div style="font-size:14px;font-weight:600;color:#1e1e2a;margin-bottom:16px;">
                <i class="fas fa-plus-circle" style="color:#6F8961;"></i> Connect New Account
            </div>

            <div class="form-group">
                <label><i class="fas fa-user"></i> Casino Username</label>
                <input type="text" id="connectUsername" placeholder="Enter your casino username">
            </div>

            <div class="form-group">
                <label><i class="fas fa-globe"></i> Casino Account Link</label>
                <input type="url" id="connectLink" placeholder="https://casino.com/profile/username">
            </div>

            <button class="btn btn-primary" id="connectBtn" onclick="handleClick(event, this); saveConnection()">
                <span class="btn-text"><i class="fas fa-link"></i> Connect Account</span>
                <span class="spinner"></span>
            </button>

            <button class="btn btn-danger" id="disconnectBtn" onclick="handleClick(event, this); disconnectAll()">
                <i class="fas fa-unlink"></i> Disconnect All
            </button>
        </div>

        <div class="footer">REVO FIXER © 2026</div>
    </div>

    <script>
        // ============================================================
        // 🔥 FIREBASE CONFIG
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyCLz9LCMNsfb7tHJ2t-oocGjVD-nVox3GM",
            authDomain: "revo-fixer-45a26.firebaseapp.com",
            databaseURL: "https://revo-fixer-45a26-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "revo-fixer-45a26",
            storageBucket: "revo-fixer-45a26.firebasestorage.app",
            messagingSenderId: "496963115399",
            appId: "1:496963115399:web:d38ec404edff64dfecdb22"
        };

        // ============================================================
        // 🚀 FIREBASE INITIALIZE
        // ============================================================
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ============================================================
        // 👤 CHECK USER
        // ============================================================
        const userId = localStorage.getItem('userId');
        if (!userId) {
            window.location.href = 'index.html';
        }

        // ============================================================
        // 🎬 CLICK HANDLER
        // ============================================================
        function handleClick(event, element) {
            const rect = element.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;

            const ripple = document.createElement('span');
            ripple.className = 'ripple';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            element.appendChild(ripple);

            setTimeout(() => { ripple.remove(); }, 600);

            element.classList.remove('btn-click');
            void element.offsetWidth;
            element.classList.add('btn-click');
            setTimeout(() => { element.classList.remove('btn-click'); }, 300);
        }

        // ============================================================
        // 📥 LOAD CONNECTIONS
        // ============================================================
        function loadConnections() {
            db.ref('users/' + userId + '/connections').on('value', (snapshot) => {
                const data = snapshot.val();
                const container = document.getElementById('connectedInfo');

                if (!data || (!data.username && !data.bettingLink)) {
                    container.innerHTML = `
                        <div class="empty">
                            <i class="fas fa-user-slash"></i>
                            No account connected
                        </div>
                    `;
                    return;
                }

                let html = '';
                if (data.username) {
                    html += `
                        <div class="item">
                            <i class="fas fa-user-check"></i>
                            <span>${escapeHtml(data.username)}</span>
                        </div>
                    `;
                }
                if (data.bettingLink) {
                    const shortLink = data.bettingLink.length > 40 ? 
                        data.bettingLink.substring(0, 40) + '...' : 
                        data.bettingLink;
                    html += `
                        <div class="item">
                            <i class="fas fa-globe"></i>
                            <span><a href="${data.bettingLink}" target="_blank" style="color:#6F8961;text-decoration:none;">${escapeHtml(shortLink)}</a></span>
                        </div>
                    `;
                }
                container.innerHTML = html;
            });
        }

        // ============================================================
        // 💾 SAVE CONNECTION
        // ============================================================
        async function saveConnection() {
            const username = document.getElementById('connectUsername').value.trim();
            const link = document.getElementById('connectLink').value.trim();

            if (!username) {
                alert('Please enter your casino username!');
                return;
            }

            const btn = document.getElementById('connectBtn');
            btn.classList.add('loading');
            btn.disabled = true;

            try {
                const connections = { username: username };
                if (link) connections.bettingLink = link;

                await db.ref('users/' + userId + '/connections').set(connections);

                await db.ref('users/' + userId + '/activity').push({
                    text: '🔗 Casino profile connected successfully',
                    time: Date.now()
                });

                btn.classList.remove('loading');
                btn.disabled = false;
                btn.innerHTML = '<span class="btn-text"><i class="fas fa-check"></i> Connected!</span>';
                btn.style.background = 'linear-gradient(135deg, #059669, #10b981)';

                document.getElementById('connectUsername').value = '';
                document.getElementById('connectLink').value = '';

                alert('✅ Casino profile connected successfully!');

                setTimeout(() => {
                    btn.innerHTML = '<span class="btn-text"><i class="fas fa-link"></i> Connect Account</span>';
                    btn.style.background = '';
                }, 3000);

            } catch (error) {
                btn.classList.remove('loading');
                btn.disabled = false;
                alert('❌ Error: ' + error.message);
            }
        }

        // ============================================================
        // 🔓 DISCONNECT ALL
        // ============================================================
        async function disconnectAll() {
            if (!confirm('⚠️ Remove all connected accounts? This action cannot be undone.')) {
                return;
            }

            const btn = document.getElementById('disconnectBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Disconnecting...';
            btn.disabled = true;

            try {
                await db.ref('users/' + userId + '/connections').set({});

                await db.ref('users/' + userId + '/activity').push({
                    text: '🔓 All casino accounts disconnected',
                    time: Date.now()
                });

                btn.innerHTML = '<i class="fas fa-unlink"></i> Disconnect All';
                btn.disabled = false;

                alert('✅ All accounts disconnected!');

            } catch (error) {
                btn.innerHTML = '<i class="fas fa-unlink"></i> Disconnect All';
                btn.disabled = false;
                alert('❌ Error: ' + error.message);
            }
        }

        // ============================================================
        // 🛡️ ESCAPE HTML
        // ============================================================
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // ============================================================
        // 🚀 INIT
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            loadConnections();
            console.log('🔗 Connect Profile page loaded!');
        });
    </script>

</body>
</html>
