<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Activation | Revo Fixer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: #f0ebe3;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            color: #1e1e2a;
            position: relative;
            overflow-x: hidden;
            padding: 16px;
        }

        .bg-effect {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at 20% 50%, rgba(111, 137, 97, 0.04), transparent 50%),
                        radial-gradient(ellipse at 80% 30%, rgba(194, 158, 99, 0.03), transparent 40%),
                        radial-gradient(ellipse at 50% 80%, rgba(111, 137, 97, 0.02), transparent 30%);
            animation: bgFloat 20s ease-in-out infinite;
        }
        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
            33% { transform: translate(2%, -2%) rotate(2deg) scale(1.02); }
            66% { transform: translate(-1%, 1%) rotate(-1deg) scale(0.98); }
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            pointer-events: none;
            opacity: 0.15;
            animation: orbFloat 25s ease-in-out infinite;
        }
        .orb-1 { width: 400px; height: 400px; background: #6F8961; top: -100px; right: -100px; animation-delay: 0s; }
        .orb-2 { width: 300px; height: 300px; background: #C29E63; bottom: -80px; left: -80px; animation-delay: -8s; }
        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(40px, -30px) scale(1.1); }
            66% { transform: translate(-30px, 20px) scale(0.9); }
        }

        .wrap { position: relative; z-index: 1; max-width: 420px; margin: 0 auto; padding: 10px 0 30px; }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(25px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes btnRipple { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
        @keyframes btnPop { 0% { transform: scale(1); } 50% { transform: scale(0.95); } 100% { transform: scale(1); } }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            animation: slideDown 0.7s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .back-btn {
            background: rgba(255,255,255,0.4);
            border: 1px solid rgba(255,255,255,0.2);
            color: #888;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        .back-btn:hover { border-color: rgba(194,158,99,0.15); color: #1e1e2a; background: rgba(255,255,255,0.7); }
        .header h1 { font-size: 20px; font-weight: 700; color: #1e1e2a; }
        .header h1 span { color: #C29E63; }

        .card {
            background: rgba(255,255,255,0.45);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 20px;
            padding: 24px 20px;
            margin: 16px 0;
            animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) backwards;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
        }

        .activation-icon {
            width: 60px;
            height: 60px;
            background: rgba(111,137,97,0.08);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            border: 1px solid rgba(111,137,97,0.1);
        }
        .activation-icon i { font-size: 28px; color: #6F8961; }

        .section-title {
            font-size: 16px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 4px;
        }
        .section-sub {
            font-size: 12px;
            color: #999;
            text-align: center;
            margin-bottom: 20px;
        }

        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block; font-size: 10px; font-weight: 600;
            color: #999; text-transform: uppercase; letter-spacing: 1.5px;
            margin-bottom: 6px;
        }
        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .input-wrapper input {
            flex: 1;
            padding: 14px 16px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            color: #1e1e2a;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-family: monospace;
            letter-spacing: 2px;
        }
        .input-wrapper input:focus { border-color: rgba(194,158,99,0.2); background: rgba(255,255,255,0.4); }
        .paste-btn {
            padding: 14px 18px;
            border: none;
            border-radius: 14px;
            background: rgba(111,137,97,0.1);
            border: 1px solid rgba(111,137,97,0.15);
            color: #6F8961;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .paste-btn:hover { background: rgba(111,137,97,0.2); }

        .btn-activate {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.4s ease;
            background: linear-gradient(135deg, #6F8961, #C29E63);
            color: #fff;
            box-shadow: 0 6px 20px rgba(111,137,97,0.15);
            margin-top: 8px;
        }
        .btn-activate:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(111,137,97,0.25); }
        .btn-activate:active { transform: scale(0.97); }
        .btn-activate:disabled {
            background: #ccc;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .btn-telegram {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.4s ease;
            background: linear-gradient(135deg, #0088cc, #006699);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
        }
        .btn-telegram:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(0,136,204,0.25); }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            padding: 12px 24px;
            border-radius: 14px;
            font-size: 12px;
            font-weight: 600;
            z-index: 9999;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            pointer-events: none;
            background: #ffffff;
            border: 1px solid rgba(0,0,0,0.04);
            box-shadow: 0 8px 30px rgba(0,0,0,0.04);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast-success { color: #6F8961; border-color: rgba(111,137,97,0.1); }
        .toast-error { color: #dc3545; border-color: rgba(220,53,69,0.1); }
        .toast-warning { color: #f59e0b; border-color: rgba(245,158,11,0.1); }

        .footer { text-align: center; margin-top: 18px; font-size: 8px; color: #ccc; letter-spacing: 3px; }

        /* Live Game Indicator */
        .live-indicator {
            display: none;
            text-align: center;
            padding: 16px;
            background: rgba(52,211,153,0.08);
            border: 1px solid rgba(52,211,153,0.1);
            border-radius: 14px;
            margin-top: 16px;
            animation: fadeUp 0.5s ease;
        }
        .live-indicator.show { display: block; }
        .live-indicator i { font-size: 24px; color: #34d399; margin-right: 8px; }
        .live-indicator .msg { font-size: 14px; font-weight: 600; color: #34d399; }

        @media (max-width: 400px) {
            .header h1 { font-size: 17px; }
            .card { padding: 18px 14px; }
            .input-wrapper { flex-direction: column; }
            .paste-btn { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="bg-effect"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="wrap">

        <div class="header">
            <button class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i></button>
            <h1><span>Activation</span></h1>
        </div>

        <div class="card">
            <div class="activation-icon">
                <i class="fas fa-play-circle"></i>
            </div>
            <div class="section-title">Activation Code</div>
            <div class="section-sub">Enter code to start live signal</div>

            <div class="form-group">
                <label>🔑 Activation Code</label>
                <div class="input-wrapper">
                    <input type="text" id="activationCode" placeholder="Enter code (e.g. ABCD-EFGH-IJKL-MNOP)" autocomplete="off">
                    <button class="paste-btn" onclick="pasteCode()"><i class="fas fa-paste"></i> Paste</button>
                </div>
            </div>

            <button class="btn-activate" id="activateBtn" onclick="activateSignal()">
                <i class="fas fa-rocket"></i> Activate Signal
            </button>

            <div class="live-indicator" id="liveIndicator">
                <i class="fas fa-circle"></i>
                <span class="msg">🔴 You are in Live Game! Redirecting...</span>
            </div>

            <button class="btn-telegram" onclick="window.open('https://t.me/+CNJHfpdP1ck0NDA1','_blank')">
                <i class="fab fa-telegram"></i> Get code from Telegram Support
            </button>
        </div>

        <div class="footer">REVO FIXER © 2026</div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ============================================================
        // 🔥 FIREBASE CONFIG
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyCLz9LCMNsfb7tHJ2t-oocGjVD-nVox3GM",
            authDomain: "revo-fixer-45a26.firebaseapp.com",
            databaseURL: "https://revo-fixer-45a26-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "revo-fixer-45a26",
            storageBucket: "revo-fixer-45a26.firebasestorage.app",
            messagingSenderId: "496963115399",
            appId: "1:496963115399:web:d38ec404edff64dfecdb22"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const userId = localStorage.getItem('userId');
        const licenseKey = localStorage.getItem('licenseKey');

        if (!userId || !licenseKey) {
            window.location.href = 'index.html';
        }

        let isActivating = false;

        function goBack() {
            window.location.href = 'dashboard.html';
        }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = `toast toast-${type} show`;
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 4000);
        }

        // ============================================================
        // 📋 PASTE CODE - with permission handling
        // ============================================================
        async function pasteCode() {
            try {
                // Check if clipboard API is available
                if (!navigator.clipboard) {
                    showToast('Please paste manually (Ctrl+V)', 'warning');
                    return;
                }

                // Request permission (if needed)
                const permission = await navigator.permissions.query({ name: 'clipboard-read' });
                
                if (permission.state === 'denied') {
                    showToast('Clipboard access denied. Please paste manually.', 'error');
                    return;
                }

                // Read from clipboard
                const text = await navigator.clipboard.readText();
                if (text) {
                    document.getElementById('activationCode').value = text.trim().toUpperCase();
                    showToast('✅ Code pasted!', 'success');
                } else {
                    showToast('No text found in clipboard', 'warning');
                }
            } catch (error) {
                console.error('Paste error:', error);
                // Fallback: show manual paste instruction
                showToast('Please paste manually using Ctrl+V', 'warning');
            }
        }

        // ============================================================
        // 🚀 ACTIVATE SIGNAL - FIXED
        // ============================================================
        async function activateSignal() {
            if (isActivating) return;

            const code = document.getElementById('activationCode').value.trim().toUpperCase();
            const btn = document.getElementById('activateBtn');

            if (!code) {
                showToast('Please enter an activation code', 'warning');
                return;
            }

            isActivating = true;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Checking...';

            try {
                // ✅ Check connection first with timeout
                const connectionPromise = db.ref('.info/connected').once('value');
                const timeoutPromise = new Promise((_, reject) => 
                    setTimeout(() => reject(new Error('Connection timeout')), 8000)
                );
                
                const connSnap = await Promise.race([connectionPromise, timeoutPromise]);
                
                if (!connSnap.val()) {
                    showToast('⚠️ No internet connection. Please check your network.', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-rocket"></i> Activate Signal';
                    isActivating = false;
                    return;
                }

                // ✅ Check activation code in activation_codes node
                const safeCode = code.replace(/[.#$\[\]]/g, '_');
                const snap = await db.ref('activation_codes/' + safeCode).once('value');

                console.log('🔍 Checking code:', code);
                console.log('📦 Data:', snap.val());

                if (!snap.exists()) {
                    showToast('❌ Invalid activation code!', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-rocket"></i> Activate Signal';
                    isActivating = false;
                    return;
                }

                const codeData = snap.val();

                // ✅ Check if already used
                if (codeData.used === true) {
                    showToast('❌ This code has already been used!', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-rocket"></i> Activate Signal';
                    isActivating = false;
                    return;
                }

                // ✅ Check if banned
                if (codeData.status === 'banned') {
                    showToast('❌ This code has been banned!', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-rocket"></i> Activate Signal';
                    isActivating = false;
                    return;
                }

                // ✅ Valid code - mark as used
                await db.ref('activation_codes/' + safeCode).update({
                    used: true,
                    usedBy: userId,
                    usedAt: Date.now()
                });

                // ✅ Get package hours from license
                const licenseSnap = await db.ref('securityCodes/' + licenseKey).once('value');
                const licenseData = licenseSnap.val() || {};
                const pkgHours = licenseData.hours || 1;
                const pkgName = licenseData.package || 'Package';
                const pkgPrice = licenseData.price || 0;

                // ✅ Update user's package status to ACTIVE
                const userRef = db.ref('users/' + userId);
                const endTime = Date.now() + (pkgHours * 3600000);

                await userRef.update({
                    'package/status': 'active',
                    'package/endTime': endTime,
                    'package/startTime': Date.now(),
                    'package/name': pkgName,
                    'package/hours': pkgHours,
                    'package/price': pkgPrice,
                    'package/activatedBy': code,
                    'package/activatedAt': Date.now()
                });

                // ✅ Also update license
                await db.ref('securityCodes/' + licenseKey).update({
                    status: 'active',
                    endTime: endTime
                });

                // ✅ Add notification
                await db.ref('notifications/' + userId).push({
                    title: '✅ Signal Activated!',
                    message: `Your ${pkgName} has been activated for ${pkgHours} hour(s).`,
                    type: 'package_activated',
                    read: false,
                    timestamp: Date.now()
                });

                // ✅ Show Live Game indicator
                const liveIndicator = document.getElementById('liveIndicator');
                liveIndicator.classList.add('show');
                showToast('🎉 Signal activated! Redirecting to Live Game...', 'success');
                btn.innerHTML = '✅ Activated!';

                // ✅ Redirect to Live Game after 2 seconds
                setTimeout(() => {
                    window.location.href = 'https://www.crazytimegame.com/live'; // Live game URL
                }, 2500);

            } catch (error) {
                console.error('❌ Activation error:', error);
                
                // Check if it's a connection timeout
                if (error.message === 'Connection timeout') {
                    showToast('⚠️ Connection timeout. Please try again.', 'error');
                } else {
                    showToast('❌ Error: ' + error.message, 'error');
                }
                
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-rocket"></i> Activate Signal';
                isActivating = false;
            }
        }

        // Enter key support
        document.getElementById('activationCode').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') activateSignal();
        });

        // ✅ Auto-detect if already active and redirect
        async function checkAlreadyActive() {
            try {
                const userSnap = await db.ref('users/' + userId + '/package/status').once('value');
                const status = userSnap.val();
                
                if (status === 'active') {
                    // Already active - show live indicator and redirect
                    const liveIndicator = document.getElementById('liveIndicator');
                    liveIndicator.classList.add('show');
                    document.querySelector('.section-sub').textContent = '✅ Already activated! Redirecting...';
                    
                    setTimeout(() => {
                        window.location.href = 'https://www.crazytimegame.com/live';
                    }, 3000);
                }
            } catch (error) {
                console.log('Check active error:', error);
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            // Check if already active
            checkAlreadyActive();
        });
    </script>

</body>
</html>
