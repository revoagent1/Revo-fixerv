<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Revo Fixer | Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: #f0ebe3;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            color: #1e1e2a;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .bg-effect {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at 20% 50%, rgba(111, 137, 97, 0.04), transparent 50%),
                        radial-gradient(ellipse at 80% 30%, rgba(194, 158, 99, 0.03), transparent 40%),
                        radial-gradient(ellipse at 50% 80%, rgba(111, 137, 97, 0.02), transparent 30%);
            animation: bgFloat 20s ease-in-out infinite;
        }
        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
            33% { transform: translate(2%, -2%) rotate(2deg) scale(1.02); }
            66% { transform: translate(-1%, 1%) rotate(-1deg) scale(0.98); }
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            pointer-events: none;
            opacity: 0.15;
            animation: orbFloat 25s ease-in-out infinite;
        }
        .orb-1 { width: 400px; height: 400px; background: #6F8961; top: -100px; right: -100px; animation-delay: 0s; }
        .orb-2 { width: 300px; height: 300px; background: #C29E63; bottom: -80px; left: -80px; animation-delay: -8s; }
        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(40px, -30px) scale(1.1); }
            66% { transform: translate(-30px, 20px) scale(0.9); }
        }

        .wrap {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            animation: fadeUp 0.7s ease;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(25px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 24px;
            padding: 40px 30px;
            transition: all 0.4s ease;
        }
        .card:hover {
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.04);
            transform: translateY(-2px);
        }

        /* ===== LOGO - FIXED ===== */
        .logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .logo .logo-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(111, 137, 97, 0.1);
            margin-bottom: 14px;
            transition: all 0.4s ease;
        }
        .logo .logo-img:hover {
            transform: scale(1.05);
            border-color: rgba(111, 137, 97, 0.2);
        }
        .logo .logo-icon {
            display: none;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6F8961, #C29E63);
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: #fff;
            margin: 0 auto 14px;
        }
        .logo h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1e1e2a;
            letter-spacing: -0.5px;
        }
        .logo h1 span {
            color: #C29E63;
        }
        .logo p {
            font-size: 11px;
            color: #999;
            letter-spacing: 4px;
            margin-top: 4px;
        }

        .input-group {
            margin-bottom: 18px;
        }
        .input-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .input-group .input-wrap {
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            padding: 4px;
            transition: all 0.4s ease;
        }
        .input-group .input-wrap:focus-within {
            border-color: #C29E63;
            background: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 0 4px rgba(194, 158, 99, 0.04);
        }
        .input-group .input-wrap input {
            flex: 1;
            padding: 14px 16px;
            background: transparent;
            border: none;
            outline: none;
            color: #1e1e2a;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1px;
        }
        .input-group .input-wrap input::placeholder {
            color: #bbb;
            font-weight: 400;
            letter-spacing: 0px;
        }
        .input-group .input-wrap button {
            background: transparent;
            border: none;
            border-radius: 12px;
            padding: 0 18px;
            color: #bbb;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .input-group .input-wrap button:hover {
            color: #6F8961;
            background: rgba(111, 137, 97, 0.04);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            margin-bottom: 10px;
            position: relative;
            overflow: hidden;
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
            transition: left 0.6s ease;
        }
        .btn:hover::before {
            left: 100%;
        }
        .btn:active {
            transform: scale(0.97);
            transition-duration: 0.1s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6F8961, #C29E63);
            color: #ffffff;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(111, 137, 97, 0.15);
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #888;
        }
        .btn-outline:hover {
            border-color: #C29E63;
            color: #1e1e2a;
            background: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .btn-telegram {
            background: rgba(0, 136, 204, 0.03);
            border: 1px solid rgba(0, 136, 204, 0.04);
            color: #888;
        }
        .btn-telegram:hover {
            background: rgba(0, 136, 204, 0.06);
            border-color: rgba(0, 136, 204, 0.08);
            color: #1e1e2a;
            transform: translateY(-2px);
        }

        .btn .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .btn.loading .btn-text {
            display: none;
        }
        .btn.loading .spinner {
            display: block;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 8px;
            color: #ccc;
            letter-spacing: 3px;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            padding: 12px 24px;
            border-radius: 14px;
            font-size: 12px;
            font-weight: 600;
            z-index: 9999;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            pointer-events: none;
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.04);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast-success {
            color: #6F8961;
            border-color: rgba(111, 137, 97, 0.1);
        }
        .toast-error {
            color: #dc3545;
            border-color: rgba(220, 53, 69, 0.1);
        }

        @media (max-width: 400px) {
            .card {
                padding: 28px 18px;
            }
            .logo h1 {
                font-size: 20px;
            }
            .logo .logo-img {
                width: 60px;
                height: 60px;
            }
            .logo .logo-icon {
                width: 60px;
                height: 60px;
                font-size: 26px;
            }
        }
    </style>
</head>
<body>

    <div class="bg-effect"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="toast" id="toast"></div>

    <div class="wrap">
        <div class="card">

            <!-- ===== LOGO ===== -->
            <div class="logo">
                <!-- 🖼️ GitHub থেকে লোগো লোড হবে -->
                <img src="https://raw.githubusercontent.com/revoagent1/Revo-fixerv/main/assets/images/logo.png"
                     alt="Revo Fixer Logo"
                     class="logo-img"
                     id="logoImg"
                     onerror="this.style.display='none'; document.getElementById('logoIcon').style.display='flex';">

                <!-- 🎨 ব্যাকআপ আইকন (ইমেজ না থাকলে) -->
                <div class="logo-icon" id="logoIcon">
                    <i class="fas fa-bolt"></i>
                </div>

                <h1>REVO <span>FIXER</span></h1>
                <p>CRAZY TIME REVO</p>
            </div>

            <!-- ===== INPUT ===== -->
            <div class="input-group">
                <label>🔑 License Key</label>
                <div class="input-wrap">
                    <input type="password" id="licenseKey" placeholder="XXXX-XXXX-XXXX-XXXX" maxlength="25">
                    <button onclick="pasteKey()"><i class="fas fa-paste"></i></button>
                </div>
            </div>

            <!-- ===== BUTTONS ===== -->
            <button class="btn btn-primary" id="loginBtn" onclick="login()">
                <span class="btn-text"><i class="fas fa-key"></i> Activate License</span>
                <span class="spinner"></span>
            </button>

            <button class="btn btn-outline" onclick="window.location.href='packages.html'">
                <i class="fas fa-shopping-cart"></i> Buy License
            </button>

            <button class="btn btn-telegram" id="supportBtn" onclick="openSupport()">
                <i class="fab fa-telegram"></i> Support
            </button>

            <div class="footer">REVO FIXER © 2026</div>
        </div>
    </div>

    <script>
        // ============================================================
        // 🔥 FIREBASE CONFIG
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyCLz9LCMNsfb7tHJ2t-oocGjVD-nVox3GM",
            authDomain: "revo-fixer-45a26.firebaseapp.com",
            databaseURL: "https://revo-fixer-45a26-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "revo-fixer-45a26",
            storageBucket: "revo-fixer-45a26.firebasestorage.app",
            messagingSenderId: "496963115399",
            appId: "1:496963115399:web:d38ec404edff64dfecdb22"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ============================================================
        // 📱 DEVICE ID
        // ============================================================
        function getDeviceId() {
            let deviceId = localStorage.getItem('deviceId');
            if (!deviceId) {
                deviceId = 'device_' + Date.now() + '_' + Math.random().toString(36).substring(2, 10);
                localStorage.setItem('deviceId', deviceId);
            }
            return deviceId;
        }

        // ============================================================
        // 📋 PASTE KEY
        // ============================================================
        async function pasteKey() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('licenseKey').value = text.trim().toUpperCase();
                showToast('✅ License key pasted!');
            } catch (err) {
                showToast('Press Ctrl+V to paste', true);
            }
        }

        // ============================================================
        // 🔗 TELEGRAM LINK
        // ============================================================
        let telegramLink = 'https://t.me/+CNJHfpdP1ck0NDA1';

        function loadTelegramLink() {
            db.ref('appSettings/telegramLink').once('value')
                .then((snapshot) => {
                    if (snapshot.exists()) {
                        telegramLink = snapshot.val();
                    }
                })
                .catch(() => {});
        }

        function openSupport() {
            window.open(telegramLink, '_blank');
        }

        // ============================================================
        // 💬 TOAST
        // ============================================================
        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = isError ? 'toast toast-error show' : 'toast toast-success show';
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ============================================================
        // 🔐 LOGIN - FIXED
        // ============================================================
        async function login() {
            const licenseKey = document.getElementById('licenseKey').value.trim().toUpperCase();
            const deviceId = getDeviceId();

            if (!licenseKey) {
                showToast('Please enter license key!', true);
                return;
            }

            const btn = document.getElementById('loginBtn');
            btn.classList.add('loading');
            btn.disabled = true;

            try {
                // 🔥 Check if license exists
                const snapshot = await db.ref(`securityCodes/${licenseKey}`).once('value');

                if (!snapshot.exists()) {
                    showToast('❌ Invalid license key!', true);
                    btn.classList.remove('loading');
                    btn.disabled = false;
                    return;
                }

                const keyData = snapshot.val();

                // Check if banned
                if (keyData.status === 'banned') {
                    showToast('❌ License key blocked. Contact support.', true);
                    btn.classList.remove('loading');
                    btn.disabled = false;
                    return;
                }

                // Check if reset required
                if (keyData.status === 'reset_required') {
                    showToast('❌ Key requires reset. Contact @RevoAgent', true);
                    btn.classList.remove('loading');
                    btn.disabled = false;
                    return;
                }

                // 🔥 Device Tracking
                let deviceLogins = keyData.deviceLogins || {};
                let currentDeviceAttempts = deviceLogins[deviceId] || 0;
                let userId = keyData.usedBy;
                const now = Date.now();

                // Check if key is expired (package time finished)
                if (keyData.package && keyData.package.endTime) {
                    if (Date.now() > keyData.package.endTime && keyData.package.status === 'active') {
                        await db.ref(`securityCodes/${licenseKey}/package/status`).set('expired');
                        showToast('❌ License expired! Please purchase a new package.', true);
                        btn.classList.remove('loading');
                        btn.disabled = false;
                        return;
                    }
                }

                // 🔥 Max 3 devices check
                const deviceCount = Object.keys(deviceLogins).length;
                const isNewDevice = !deviceLogins[deviceId];

                if (isNewDevice && deviceCount >= 3) {
                    showToast('❌ License already used on 3 devices! Contact support to reset.', true);
                    btn.classList.remove('loading');
                    btn.disabled = false;
                    return;
                }

                // If new device, check if key has package
                if (isNewDevice && !keyData.package) {
                    showToast('❌ No active package found. Please purchase a package first.', true);
                    btn.classList.remove('loading');
                    btn.disabled = false;
                    return;
                }

                // ✅ If user doesn't exist, create new user
                if (!userId) {
                    userId = 'user_' + now + '_' + Math.random().toString(36).substring(2, 8);

                    const userData = {
                        username: 'User',
                        balance: 0,
                        createdAt: now,
                        usedKey: licenseKey,
                        deviceId: deviceId,
                        lastLogin: now,
                        package: keyData.package || {
                            name: '1 Hour Package',
                            price: 2000,
                            hours: 1,
                            status: 'pending',
                            startTime: now,
                            endTime: now + 3600000
                        },
                        activity: [{
                            text: '✅ Account created with license key',
                            time: now
                        }]
                    };

                    await db.ref(`users/${userId}`).set(userData);

                    // Update device logins
                    deviceLogins[deviceId] = 1;
                    await db.ref(`securityCodes/${licenseKey}`).update({
                        status: 'used',
                        usedBy: userId,
                        usedAt: now,
                        deviceLogins: deviceLogins,
                        totalDevices: Object.keys(deviceLogins).length
                    });

                    showToast('✅ License activated! Welcome!');
                    localStorage.setItem('userId', userId);
                    localStorage.setItem('licenseKey', licenseKey);

                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);

                } else {
                    // ✅ Existing user login
                    // Check if device is already logged in
                    if (deviceLogins[deviceId] === undefined) {
                        // New device but under limit
                        if (Object.keys(deviceLogins).length < 3) {
                            deviceLogins[deviceId] = 1;
                        } else {
                            showToast('❌ Max 3 devices reached!', true);
                            btn.classList.remove('loading');
                            btn.disabled = false;
                            return;
                        }
                    } else {
                        // Existing device - increment login count
                        deviceLogins[deviceId] = currentDeviceAttempts + 1;
                    }

                    // Update login info
                    await db.ref(`securityCodes/${licenseKey}`).update({
                        lastLogin: now,
                        deviceLogins: deviceLogins,
                        lastDeviceId: deviceId
                    });

                    await db.ref(`users/${userId}`).update({
                        lastLogin: now,
                        deviceId: deviceId
                    });

                    await db.ref(`users/${userId}/activity`).push({
                        text: `🔑 Login from device: ${deviceId}`,
                        time: now
                    });

                    showToast('✅ Login successful!');
                    localStorage.setItem('userId', userId);
                    localStorage.setItem('licenseKey', licenseKey);

                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                }

                btn.classList.remove('loading');
                btn.disabled = false;

            } catch (error) {
                console.error('Login error:', error);
                showToast('❌ Error: ' + error.message, true);
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        // ============================================================
        // ⌨️ ENTER KEY SUPPORT
        // ============================================================
        document.getElementById('licenseKey').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });

        // ============================================================
        // 🚀 INIT
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            loadTelegramLink();
            console.log('🚀 Login page loaded!');
        });
    </script>

</body>
</html>
