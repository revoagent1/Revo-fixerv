<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Revo Fixer | Transactions</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: #f0ebe3;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            color: #1e1e2a;
            position: relative;
            overflow-x: hidden;
            padding: 16px;
        }

        .bg-effect {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at 20% 50%, rgba(111, 137, 97, 0.04), transparent 50%),
                        radial-gradient(ellipse at 80% 30%, rgba(194, 158, 99, 0.03), transparent 40%),
                        radial-gradient(ellipse at 50% 80%, rgba(111, 137, 97, 0.02), transparent 30%);
            animation: bgFloat 20s ease-in-out infinite;
        }
        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
            33% { transform: translate(2%, -2%) rotate(2deg) scale(1.02); }
            66% { transform: translate(-1%, 1%) rotate(-1deg) scale(0.98); }
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            pointer-events: none;
            opacity: 0.15;
            animation: orbFloat 25s ease-in-out infinite;
        }
        .orb-1 { width: 400px; height: 400px; background: #6F8961; top: -100px; right: -100px; animation-delay: 0s; }
        .orb-2 { width: 300px; height: 300px; background: #C29E63; bottom: -80px; left: -80px; animation-delay: -8s; }
        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(40px, -30px) scale(1.1); }
            66% { transform: translate(-30px, 20px) scale(0.9); }
        }

        .wrap { position: relative; z-index: 1; max-width: 420px; margin: 0 auto; padding: 10px 0 30px; }

        /* ===== ANIMATIONS ===== */
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(25px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes countUp { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        @keyframes btnRipple { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
        @keyframes btnPop { 0% { transform: scale(1); } 50% { transform: scale(0.95); } 100% { transform: scale(1); } }
        @keyframes notifSlide { from { opacity: 0; transform: translateX(-15px); } to { opacity: 1; transform: translateX(0); } }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            animation: slideDown 0.7s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .header h1 {
            font-size: 20px;
            font-weight: 700;
            color: #1e1e2a;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header h1 i { color: #6F8961; font-size: 22px; }
        .header .back-btn {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #888;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.4s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header .back-btn:hover {
            border-color: rgba(194, 158, 99, 0.15);
            color: #1e1e2a;
            background: rgba(255, 255, 255, 0.7);
            transform: translateY(-2px);
        }

        /* ===== CARD ===== */
        .card {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 20px;
            padding: 20px 18px;
            margin: 14px 0;
            transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) backwards;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            position: relative;
            overflow: hidden;
        }
        .card:hover {
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.04);
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.6);
        }

        /* ===== BALANCE BOX ===== */
        .balance-box {
            text-align: center;
            padding: 16px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            transition: all 0.4s ease;
        }
        .balance-box:hover {
            background: rgba(255, 255, 255, 0.25);
        }
        .balance-box .lbl {
            font-size: 9px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 500;
        }
        .balance-box .amt {
            font-size: 32px;
            font-weight: 700;
            color: #1e1e2a;
            margin-top: 4px;
            transition: all 0.4s ease;
            animation: countUp 0.6s ease;
        }
        .balance-box:hover .amt { color: #6F8961; }

        /* ===== FILTER TABS ===== */
        .filter-tabs {
            display: flex;
            gap: 8px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 4px;
            margin-bottom: 16px;
        }
        .filter-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            background: transparent;
            border: none;
            border-radius: 12px;
            color: #999;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .filter-tab.active {
            background: rgba(255, 255, 255, 0.4);
            color: #1e1e2a;
        }
        .filter-tab:hover:not(.active) { color: #666; }
        .filter-tab i { margin-right: 4px; }

        /* ===== TRANSACTION ITEM ===== */
        .txn-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.02);
            transition: all 0.4s ease;
            animation: notifSlide 0.4s ease;
        }
        .txn-item:last-child { border-bottom: none; }
        .txn-item:hover {
            background: rgba(255, 255, 255, 0.3);
            margin: 0 -8px;
            padding: 12px 8px;
            border-radius: 12px;
        }
        .txn-item .icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        .txn-item .icon.deposit {
            background: rgba(52, 211, 153, 0.08);
            color: #34d399;
        }
        .txn-item .icon.package {
            background: rgba(74, 158, 255, 0.08);
            color: #4a9eff;
        }
        .txn-item .icon.reward {
            background: rgba(245, 158, 11, 0.08);
            color: #f59e0b;
        }
        .txn-item .icon.withdraw {
            background: rgba(248, 113, 113, 0.08);
            color: #f87171;
        }
        .txn-item .info {
            flex: 1;
        }
        .txn-item .info .title {
            font-size: 13px;
            font-weight: 600;
            color: #1e1e2a;
        }
        .txn-item .info .desc {
            font-size: 10px;
            color: #999;
            margin-top: 2px;
        }
        .txn-item .amount {
            text-align: right;
        }
        .txn-item .amount .val {
            font-size: 14px;
            font-weight: 600;
        }
        .txn-item .amount .val.positive { color: #34d399; }
        .txn-item .amount .val.negative { color: #f87171; }
        .txn-item .amount .status {
            font-size: 9px;
            color: #999;
            margin-top: 2px;
        }
        .txn-item .amount .status.success { color: #34d399; }
        .txn-item .amount .status.pending { color: #f59e0b; }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #bbb;
        }
        .empty-state i {
            font-size: 40px;
            margin-bottom: 12px;
            display: block;
            color: #ccc;
        }
        .empty-state p { font-size: 13px; }

        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            animation: btnRipple 0.6s ease-out forwards;
            pointer-events: none;
            width: 40px;
            height: 40px;
            transform: translate(-50%, -50%);
        }
        .btn-click { animation: btnPop 0.3s cubic-bezier(0.22, 1, 0.36, 1); }

        .footer {
            text-align: center;
            margin-top: 18px;
            font-size: 8px;
            color: #ccc;
            letter-spacing: 3px;
        }

        ::-webkit-scrollbar { width: 0; background: transparent; }

        @media (max-width: 400px) {
            .wrap { padding: 6px 0; }
            .card { padding: 16px 14px; }
            .txn-item { flex-wrap: wrap; gap: 10px; }
            .txn-item .amount { text-align: left; width: 100%; padding-left: 54px; }
            .balance-box .amt { font-size: 26px; }
            .header h1 { font-size: 17px; }
            .filter-tab { font-size: 8px; padding: 8px 4px; }
        }
    </style>
</head>
<body>

    <div class="bg-effect"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="wrap">

        <!-- ===== HEADER ===== -->
        <div class="header">
            <h1><i class="fas fa-history"></i>Transactions</h1>
            <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
        </div>

        <!-- ===== BALANCE ===== -->
        <div class="card">
            <div class="balance-box">
                <div class="lbl"><i class="fas fa-wallet" style="color:#6F8961;margin-right:4px;"></i>Current Balance</div>
                <div class="amt" id="currentBalance">₹0</div>
            </div>
        </div>

        <!-- ===== FILTERS ===== -->
        <div class="card">
            <div class="filter-tabs">
                <button class="filter-tab active" data-filter="all" onclick="setFilter('all', this)">
                    <i class="fas fa-list"></i> All
                </button>
                <button class="filter-tab" data-filter="deposit" onclick="setFilter('deposit', this)">
                    <i class="fas fa-arrow-down"></i> Deposit
                </button>
                <button class="filter-tab" data-filter="package" onclick="setFilter('package', this)">
                    <i class="fas fa-box"></i> Package
                </button>
                <button class="filter-tab" data-filter="withdraw" onclick="setFilter('withdraw', this)">
                    <i class="fas fa-arrow-up"></i> Withdraw
                </button>
            </div>
        </div>

        <!-- ===== TRANSACTION LIST ===== -->
        <div class="card">
            <div id="transactionList">
                <div class="empty-state">
                    <i class="fas fa-receipt"></i>
                    <p>No transactions yet</p>
                </div>
            </div>
        </div>

        <div class="footer">REVO FIXER © 2026</div>
    </div>

    <script>
        // ============================================================
        // 🔥 FIREBASE CONFIG
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyCLz9LCMNsfb7tHJ2t-oocGjVD-nVox3GM",
            authDomain: "revo-fixer-45a26.firebaseapp.com",
            databaseURL: "https://revo-fixer-45a26-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "revo-fixer-45a26",
            storageBucket: "revo-fixer-45a26.firebasestorage.app",
            messagingSenderId: "496963115399",
            appId: "1:496963115399:web:d38ec404edff64dfecdb22"
        };

        // ============================================================
        // 🚀 FIREBASE INITIALIZE
        // ============================================================
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ============================================================
        // 📊 STATE
        // ============================================================
        let allTransactions = [];
        let currentFilter = 'all';

        // ============================================================
        // 🎬 CLICK HANDLER
        // ============================================================
        function handleClick(event, element) {
            const rect = element.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;

            const ripple = document.createElement('span');
            ripple.className = 'ripple';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            element.appendChild(ripple);

            setTimeout(() => { ripple.remove(); }, 600);

            element.classList.remove('btn-click');
            void element.offsetWidth;
            element.classList.add('btn-click');
            setTimeout(() => { element.classList.remove('btn-click'); }, 300);
        }

        // ============================================================
        // 🔄 SET FILTER
        // ============================================================
        function setFilter(filter, element) {
            currentFilter = filter;
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.filter === filter);
            });
            renderTransactions();
        }

        // ============================================================
        // 📥 LOAD TRANSACTIONS
        // ============================================================
        function loadTransactions() {
            const userId = localStorage.getItem('userId');
            if (!userId) {
                window.location.href = 'index.html';
                return;
            }

            // Load balance
            db.ref('users/' + userId + '/balance').on('value', (snap) => {
                const balance = snap.val() || 0;
                document.getElementById('currentBalance').textContent = '₹' + balance.toLocaleString();
            });

            // Load payment requests
            db.ref('paymentRequests').orderByChild('userId').equalTo(userId).on('value', (snapshot) => {
                const data = snapshot.val();
                allTransactions = [];

                if (data) {
                    Object.entries(data).forEach(([id, txn]) => {
                        let type = 'deposit';
                        let icon = 'deposit';
                        let title = 'Deposit';

                        if (txn.packageName) {
                            type = 'package';
                            icon = 'package';
                            title = 'Package Purchase';
                        } else if (txn.type === 'withdraw') {
                            type = 'withdraw';
                            icon = 'withdraw';
                            title = 'Withdrawal';
                        }

                        const amount = txn.amount || txn.packagePrice || 0;
                        const status = txn.status || 'pending';

                        allTransactions.push({
                            id: id,
                            type: type,
                            icon: icon,
                            title: title,
                            amount: amount,
                            status: status,
                            createdAt: txn.createdAt || Date.now(),
                            method: txn.method || 'N/A',
                            packageName: txn.packageName || null
                        });
                    });
                }

                allTransactions.sort((a, b) => b.createdAt - a.createdAt);
                renderTransactions();
            });
        }

        // ============================================================
        // 🖥️ RENDER TRANSACTIONS
        // ============================================================
        function renderTransactions() {
            const container = document.getElementById('transactionList');

            let filtered = allTransactions;
            if (currentFilter !== 'all') {
                filtered = allTransactions.filter(t => t.type === currentFilter);
            }

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-receipt"></i>
                        <p>No transactions found</p>
                    </div>
                `;
                return;
            }

            let html = '';
            filtered.forEach(txn => {
                const isPositive = txn.type === 'deposit' || txn.type === 'reward';
                const amountClass = isPositive ? 'positive' : 'negative';
                const sign = isPositive ? '+' : '-';
                const statusClass = txn.status === 'approved' || txn.status === 'success' ? 'success' :
                                   txn.status === 'pending' ? 'pending' : '';

                const iconMap = {
                    deposit: '<i class="fas fa-arrow-down"></i>',
                    package: '<i class="fas fa-box"></i>',
                    withdraw: '<i class="fas fa-arrow-up"></i>',
                    reward: '<i class="fas fa-gift"></i>'
                };
                const icon = iconMap[txn.icon] || iconMap.deposit;

                let desc = txn.method || '';
                if (txn.packageName) desc = txn.packageName;

                html += `
                    <div class="txn-item">
                        <div class="icon ${txn.icon}">${icon}</div>
                        <div class="info">
                            <div class="title">${txn.title}</div>
                            <div class="desc">${desc} • ${formatDate(txn.createdAt)}</div>
                        </div>
                        <div class="amount">
                            <div class="val ${amountClass}">${sign}₹${txn.amount.toLocaleString()}</div>
                            <div class="status ${statusClass}">${txn.status.toUpperCase()}</div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // ============================================================
        // 📅 FORMAT DATE
        // ============================================================
        function formatDate(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = Math.floor((now - date) / 1000);

            if (diff < 60) return 'Just now';
            if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
            if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
            return date.toLocaleDateString('en-IN', { day: '2-digit', month: 'short' });
        }

        // ============================================================
        // 🚀 INIT
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            loadTransactions();
            console.log('📊 Transactions page loaded!');
        });
    </script>

</body>
</html>
