<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Revo Fixer | Payment</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0a0b14;
            --card: #141827;
            --border: #1e2240;
            --input: #0d1020;
            --blue: #448AFF;
            --text: #ffffff;
            --text2: #bcc6e0;
            --text3: #8899cc;
            --text4: #5a6a99;
            --green: #2ed573;
            --red: #ff4757;
            --orange: #ffa502;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            padding-bottom: 30px;
        }

        .header {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .back-btn {
            background: rgba(68,138,255,0.1);
            border: 1px solid rgba(68,138,255,0.2);
            color: var(--blue);
            width: 38px;
            height: 38px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.15s;
        }
        .back-btn:active {
            transform: scale(0.92);
        }
        .header h1 {
            font-size: 16px;
            font-weight: 800;
        }
        .header h1 span {
            color: var(--blue);
        }

        .main-content {
            padding: 16px;
            max-width: 450px;
            margin: 0 auto;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 14px;
        }

        .amount-display {
            text-align: center;
            padding: 16px;
            background: rgba(68,138,255,0.05);
            border: 1px solid rgba(68,138,255,0.1);
            border-radius: 12px;
            margin-bottom: 18px;
        }
        .amount-label {
            font-size: 10px;
            color: var(--text3);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .amount-value {
            font-size: 30px;
            font-weight: 800;
            color: var(--blue);
        }
        .amount-method {
            font-size: 12px;
            color: var(--text2);
            margin-top: 4px;
            text-transform: uppercase;
        }

        .section-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 12px;
            margin-top: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .section-title i {
            color: var(--blue);
        }
        .section-title:first-of-type {
            margin-top: 0;
        }

        .form-group {
            margin-bottom: 14px;
        }
        .form-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--text3);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 6px;
            display: block;
        }
        .form-input {
            width: 100%;
            padding: 13px 14px;
            background: var(--input);
            border: 2px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }
        .form-input:focus {
            border-color: var(--blue);
        }
        .form-input::placeholder {
            color: #3a4060;
        }

        .address-box {
            background: var(--input);
            border: 2px solid var(--blue);
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            word-break: break-all;
            font-size: 13px;
            color: var(--blue);
            font-family: 'Courier New', monospace;
        }
        .address-box span {
            flex: 1;
        }
        .copy-btn {
            background: var(--blue);
            border: none;
            color: #fff;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s;
            flex-shrink: 0;
        }
        .copy-btn:active {
            transform: scale(0.95);
        }

        .upload-area {
            background: var(--input);
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 16px;
        }
        .upload-area:active {
            transform: scale(0.97);
        }
        .upload-area:hover {
            border-color: var(--blue);
        }
        .upload-icon {
            font-size: 30px;
            color: var(--text3);
            margin-bottom: 6px;
        }
        .upload-text {
            font-size: 12px;
            color: var(--text3);
        }
        .upload-preview {
            width: 100%;
            max-height: 200px;
            object-fit: contain;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1.5px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--blue), #2962FF);
            color: #fff;
            box-shadow: 0 4px 15px rgba(68,138,255,0.25);
        }
        .btn-primary:active {
            transform: scale(0.96);
        }
        .btn-primary:disabled {
            background: #1e2240;
            color: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-primary .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .btn-primary.loading .btn-text {
            display: none;
        }
        .btn-primary.loading .spinner {
            display: block;
        }

        .toast {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            z-index: 9999;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
        }
        .toast-success {
            background: var(--green);
            color: white;
        }
        .toast-error {
            background: var(--red);
            color: white;
        }

        .watermark {
            text-align: center;
            color: rgba(255,255,255,0.06);
            font-size: 10px;
            padding: 10px;
        }

        @media (max-width: 400px) {
            .card { padding: 16px 14px; }
            .amount-value { font-size: 24px; }
            .address-box { font-size: 11px; padding: 10px 12px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <button class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i></button>
            <h1><span id="methodTitle">UPI</span> PAYMENT</h1>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="main-content">
        <div class="card">
            
            <!-- Amount Display -->
            <div class="amount-display">
                <div class="amount-label">Amount to Pay</div>
                <div class="amount-value" id="displayAmount">₹0</div>
                <div class="amount-method" id="displayMethod">UPI</div>
            </div>

            <!-- UPI FORM -->
            <div id="upiForm">
                <div class="section-title"><i class="fas fa-user-edit"></i> Your Details</div>
                
                <div class="form-group">
                    <label class="form-label">Your UPI ID</label>
                    <input type="text" class="form-input" id="userUpiId" placeholder="e.g., username@okhdfc">
                </div>
                <div class="form-group">
                    <label class="form-label">Your Name</label>
                    <input type="text" class="form-input" id="userUpiName" placeholder="Enter your name">
                </div>
                <div class="form-group">
                    <label class="form-label">Phone Number</label>
                    <input type="tel" class="form-input" id="userPhone" placeholder="Enter phone number">
                </div>

                <div class="section-title"><i class="fas fa-building"></i> Pay to</div>
                <div class="address-box">
                    <span id="adminUpiId">Loading...</span>
                    <button class="copy-btn" onclick="copyAddress('upi')">📋 Copy</button>
                </div>

                <div class="form-group">
                    <label class="form-label">Transaction ID / UTR Number</label>
                    <input type="text" class="form-input" id="transactionId" placeholder="Enter UTR/Transaction ID">
                </div>
            </div>

            <!-- BKASH FORM -->
            <div id="bkashForm" style="display:none;">
                <div class="section-title"><i class="fas fa-user-edit"></i> Your Details</div>
                
                <div class="form-group">
                    <label class="form-label">Your Bkash Number</label>
                    <input type="tel" class="form-input" id="userBkashNumber" placeholder="e.g., 01XXXXXXXXX">
                </div>
                <div class="form-group">
                    <label class="form-label">Your Name</label>
                    <input type="text" class="form-input" id="userBkashName" placeholder="Enter your name">
                </div>

                <div class="section-title"><i class="fas fa-building"></i> Send Payment to</div>
                <div class="address-box">
                    <span id="adminBkashNumber">Loading...</span>
                    <button class="copy-btn" onclick="copyAddress('bkash')">📋 Copy</button>
                </div>

                <div class="form-group">
                    <label class="form-label">Transaction ID / Reference No</label>
                    <input type="text" class="form-input" id="bkashTransactionId" placeholder="Enter transaction ID">
                </div>
            </div>

            <!-- USDT FORM -->
            <div id="usdtForm" style="display:none;">
                <div class="section-title"><i class="fas fa-wallet"></i> USDT TRC20 Wallet</div>
                <div class="address-box">
                    <span id="adminUsdtAddress">Loading...</span>
                    <button class="copy-btn" onclick="copyAddress('usdt')">📋 Copy</button>
                </div>
            </div>

            <!-- SCREENSHOT -->
            <div class="section-title"><i class="fas fa-camera"></i> Payment Screenshot</div>
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon"><i class="fas fa-cloud-upload-alt"></i></div>
                <div class="upload-text">Click to upload payment screenshot</div>
                <img class="upload-preview" id="uploadPreview">
            </div>
            <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="previewImage(event)">

            <button class="btn btn-primary" id="submitBtn" onclick="submitPayment()">
                <span class="btn-text">📤 SUBMIT PAYMENT</span>
                <span class="spinner"></span>
            </button>

        </div>
    </div>

    <div class="watermark">Revo Fixer © 2026</div>

    <script>
        // ============================================================
        // 🔥 FIREBASE CONFIG
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyCLz9LCMNsfb7tHJ2t-oocGjVD-nVox3GM",
            authDomain: "revo-fixer-45a26.firebaseapp.com",
            databaseURL: "https://revo-fixer-45a26-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "revo-fixer-45a26",
            storageBucket: "revo-fixer-45a26.firebasestorage.app",
            messagingSenderId: "496963115399",
            appId: "1:496963115399:web:d38ec404edff64dfecdb22"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ============================================================
        // 📱 CHECK USER
        // ============================================================
        const userId = localStorage.getItem('userId');
        if (!userId) {
            window.location.href = 'index.html';
        }

        // ============================================================
        // 📦 GET DEPOSIT DATA
        // ============================================================
        const amount = localStorage.getItem('depositAmount') || '0';
        const method = localStorage.getItem('depositMethod') || 'upi';
        const currency = localStorage.getItem('depositCurrency') || 'INR';
        const convertedAmount = localStorage.getItem('convertedAmount') || amount;
        const usdtRate = localStorage.getItem('usdtRate') || '94.14';

        let selectedFile = null;

        const symbol = method === 'bkash' ? '৳' : (method === 'usdt' ? '$' : '₹');
        document.getElementById('displayAmount').textContent = symbol + parseInt(amount).toLocaleString();
        document.getElementById('displayMethod').textContent = method.toUpperCase();
        document.getElementById('methodTitle').textContent = method.toUpperCase();

        // ============================================================
        // 📥 LOAD PAYMENT METHODS (Real-time)
        // ============================================================
        function loadPaymentMethods() {
            // UPI
            db.ref('paymentMethods/upi/numbers').on('value', (snap) => {
                const data = snap.val();
                if (data) {
                    const active = Object.values(data).find(n => n.isActive !== false);
                    document.getElementById('adminUpiId').textContent = active ? active.number : 'No active UPI';
                } else {
                    document.getElementById('adminUpiId').textContent = 'No UPI configured';
                }
            });

            // Bkash
            db.ref('paymentMethods/bkash/numbers').on('value', (snap) => {
                const data = snap.val();
                if (data) {
                    const active = Object.values(data).find(n => n.isActive !== false);
                    document.getElementById('adminBkashNumber').textContent = active ? active.number : 'No active Bkash';
                } else {
                    document.getElementById('adminBkashNumber').textContent = 'No Bkash configured';
                }
            });

            // USDT
            db.ref('paymentMethods/usdt/numbers').on('value', (snap) => {
                const data = snap.val();
                if (data) {
                    const active = Object.values(data).find(n => n.isActive !== false);
                    document.getElementById('adminUsdtAddress').textContent = active ? active.number : 'No active USDT';
                } else {
                    document.getElementById('adminUsdtAddress').textContent = 'No USDT configured';
                }
            });
        }

        // ============================================================
        // 📋 COPY ADDRESS
        // ============================================================
        function copyAddress(methodType) {
            let text = '';
            if (methodType === 'upi') {
                text = document.getElementById('adminUpiId').textContent;
            } else if (methodType === 'bkash') {
                text = document.getElementById('adminBkashNumber').textContent;
            } else {
                text = document.getElementById('adminUsdtAddress').textContent;
            }
            
            if (!text || text === 'Loading...' || text.includes('No active') || text.includes('No UPI') || text.includes('No Bkash') || text.includes('No USDT')) {
                showToast('Payment address not available', true);
                return;
            }
            
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast('✅ Address copied!');
                }).catch(() => {
                    fallbackCopy(text);
                });
            } else {
                fallbackCopy(text);
            }
        }

        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.top = '-9999px';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                showToast('✅ Address copied!');
            } catch (err) {
                showToast('Please copy manually', true);
            }
            document.body.removeChild(textarea);
        }

        // ============================================================
        // 📤 PREVIEW IMAGE
        // ============================================================
        function previewImage(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            // Check file size (max 2MB)
            if (file.size > 2 * 1024 * 1024) {
                showToast('File size must be less than 2MB', true);
                event.target.value = '';
                return;
            }
            
            selectedFile = file;
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('uploadPreview').src = e.target.result;
                document.getElementById('uploadPreview').style.display = 'block';
                document.querySelector('.upload-icon').style.display = 'none';
                document.querySelector('.upload-text').textContent = 'Click to change screenshot';
            };
            reader.readAsDataURL(file);
        }

        // ============================================================
        // 🔄 CONVERT IMAGE TO BASE64 (Compressed)
        // ============================================================
        function convertImageToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // ============================================================
        // 📤 SUBMIT PAYMENT
        // ============================================================
        async function submitPayment() {
            const btn = document.getElementById('submitBtn');
            
            // =============================================
            // 1. Validate UPI
            // =============================================
            if (method === 'upi') {
                const upiId = document.getElementById('userUpiId').value.trim();
                const upiName = document.getElementById('userUpiName').value.trim();
                const phone = document.getElementById('userPhone').value.trim();
                const txnId = document.getElementById('transactionId').value.trim();
                
                if (!upiId) { showToast('Enter your UPI ID', true); return; }
                if (!upiName) { showToast('Enter your name', true); return; }
                if (!phone) { showToast('Enter phone number', true); return; }
                if (!txnId) { showToast('Enter Transaction ID', true); return; }
            }
            
            // =============================================
            // 2. Validate Bkash
            // =============================================
            if (method === 'bkash') {
                const bkashNumber = document.getElementById('userBkashNumber').value.trim();
                const bkashName = document.getElementById('userBkashName').value.trim();
                const txnId = document.getElementById('bkashTransactionId').value.trim();
                
                if (!bkashNumber) { showToast('Enter your Bkash number', true); return; }
                if (!bkashName) { showToast('Enter your name', true); return; }
                if (!txnId) { showToast('Enter Transaction ID', true); return; }
            }
            
            // =============================================
            // 3. Check Screenshot
            // =============================================
            if (!selectedFile) {
                showToast('Upload payment screenshot', true);
                return;
            }
            
            // =============================================
            // 4. Submit
            // =============================================
            btn.classList.add('loading');
            btn.disabled = true;
            
            try {
                const imageBase64 = await convertImageToBase64(selectedFile);
                
                // Get user data
                const userSnapshot = await db.ref('users/' + userId).once('value');
                const userData = userSnapshot.val() || {};
                
                // Prepare payment data
                const paymentData = {
                    userId: userId,
                    username: userData.username || 'User',
                    amount: parseInt(amount),
                    currency: currency,
                    method: method,
                    status: 'pending',
                    createdAt: Date.now(),
                    screenshot: imageBase64,
                    convertedAmount: parseInt(convertedAmount),
                    usdtRate: parseFloat(usdtRate)
                };
                
                // Add method specific data
                if (method === 'upi') {
                    paymentData.userUpiId = document.getElementById('userUpiId').value.trim();
                    paymentData.userName = document.getElementById('userUpiName').value.trim();
                    paymentData.userPhone = document.getElementById('userPhone').value.trim();
                    paymentData.transactionId = document.getElementById('transactionId').value.trim();
                } else if (method === 'bkash') {
                    paymentData.userBkashNumber = document.getElementById('userBkashNumber').value.trim();
                    paymentData.userName = document.getElementById('userBkashName').value.trim();
                    paymentData.transactionId = document.getElementById('bkashTransactionId').value.trim();
                }
                
                // Save to Firebase
                await db.ref('paymentRequests').push(paymentData);
                
                // Add activity
                await db.ref('users/' + userId + '/activity').push({
                    text: `💰 Payment request: ${symbol}${parseInt(amount).toLocaleString()} via ${method.toUpperCase()}`,
                    time: Date.now()
                });
                
                // Clear localStorage
                localStorage.removeItem('depositAmount');
                localStorage.removeItem('depositMethod');
                localStorage.removeItem('depositCurrency');
                localStorage.removeItem('convertedAmount');
                localStorage.removeItem('usdtRate');
                
                showToast('✅ Payment submitted! Admin will verify.');
                
                btn.classList.remove('loading');
                btn.disabled = false;
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 2000);
                
            } catch (error) {
                console.error('❌ Submit Error:', error);
                showToast('Error: ' + error.message, true);
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        // ============================================================
        // 💬 TOAST
        // ============================================================
        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast ' + (isError ? 'toast-error' : 'toast-success') + ' show';
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ============================================================
        // 🔙 GO BACK
        // ============================================================
        function goBack() {
            window.location.href = 'deposit.html';
        }

        // ============================================================
        // 🚀 INIT
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            console.log('💰 Payment Submit page loaded');
            
            // Show/Hide forms based on method
            if (method === 'upi') {
                document.getElementById('upiForm').style.display = 'block';
                document.getElementById('bkashForm').style.display = 'none';
                document.getElementById('usdtForm').style.display = 'none';
            } else if (method === 'bkash') {
                document.getElementById('upiForm').style.display = 'none';
                document.getElementById('bkashForm').style.display = 'block';
                document.getElementById('usdtForm').style.display = 'none';
            } else {
                document.getElementById('upiForm').style.display = 'none';
                document.getElementById('bkashForm').style.display = 'none';
                document.getElementById('usdtForm').style.display = 'block';
            }
            
            loadPaymentMethods();
        });
    </script>
</body>
</html>
