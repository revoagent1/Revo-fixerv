<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Revo Fixer | Deposit</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0a0a1a;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            color: #fff;
            position: relative;
            overflow-x: hidden;
            padding: 16px;
        }

        body::before,
        body::after {
            content: "";
            position: absolute;
            width: 420px;
            height: 420px;
            border-radius: 50%;
            filter: blur(120px);
            animation: floatBlob 12s ease-in-out infinite alternate;
            z-index: 0;
        }
        body::before {
            background: #0d2b4a;
            left: -120px;
            top: -120px;
        }
        body::after {
            background: #1a3a6a;
            right: -120px;
            bottom: -120px;
        }
        @keyframes floatBlob {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(80px, 60px) scale(1.3); }
        }

        .wrap {
            position: relative;
            z-index: 2;
            max-width: 420px;
            margin: 0 auto;
            padding: 10px 0 30px;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            animation: fadeDown 0.6s ease-out;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header h1 i {
            color: #4a9eff;
            font-size: 22px;
        }
        .header .back-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.4);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header .back-btn:hover {
            border-color: rgba(74, 158, 255, 0.15);
            color: #7abfff;
            background: rgba(74, 158, 255, 0.03);
        }
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== GLASS CARD ===== */
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            padding: 20px 18px;
            margin: 14px 0;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            animation: fadeUp 0.6s ease-out backwards;
        }
        .card:nth-child(1) { animation-delay: 0.05s; }
        .card:nth-child(2) { animation-delay: 0.1s; }
        .card:nth-child(3) { animation-delay: 0.15s; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card:hover {
            border-color: rgba(255, 255, 255, 0.07);
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
        }

        /* ===== METHOD TABS ===== */
        .method-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            padding: 4px;
        }
        .method-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            background: transparent;
            border: none;
            border-radius: 12px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .method-tab.active {
            background: rgba(74, 158, 255, 0.08);
            color: #7abfff;
        }
        .method-tab:hover:not(.active) {
            color: rgba(255, 255, 255, 0.6);
        }
        .method-tab i {
            margin-right: 6px;
        }

        /* ===== FORM ===== */
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 10px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.25);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .form-group input:focus,
        .form-group select:focus {
            border-color: rgba(74, 158, 255, 0.15);
            background: rgba(255, 255, 255, 0.03);
        }
        .form-group input::placeholder,
        .form-group select::placeholder {
            color: rgba(255, 255, 255, 0.1);
        }
        .form-group select option {
            background: #0a0a1a;
            color: #fff;
        }

        /* ===== AMOUNT DISPLAY ===== */
        .amount-display {
            text-align: center;
            padding: 16px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            margin-bottom: 16px;
        }
        .amount-display .lbl {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 500;
        }
        .amount-display .amt {
            font-size: 32px;
            font-weight: 700;
            color: #4a9eff;
            margin-top: 4px;
        }

        /* ===== BUTTON ===== */
        .btn-submit {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            background: linear-gradient(135deg, #1a4a8a, #2a6aba);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }
        .btn-submit::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.06), transparent);
            transition: left 0.6s;
        }
        .btn-submit:hover::before {
            left: 100%;
        }
        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(26, 74, 138, 0.2);
        }
        .btn-submit:active {
            transform: scale(0.97);
        }

        /* ===== MIN DEPOSIT NOTE ===== */
        .min-note {
            text-align: center;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.15);
            margin-top: 8px;
            letter-spacing: 0.5px;
        }
        .min-note i {
            color: #f59e0b;
            margin-right: 4px;
        }

        /* ===== FOOTER ===== */
        .footer {
            text-align: center;
            margin-top: 18px;
            font-size: 8px;
            color: rgba(255, 255, 255, 0.03);
            letter-spacing: 3px;
        }

        ::-webkit-scrollbar { width: 0; background: transparent; }
    </style>
</head>
<body>

    <div class="wrap">

        <!-- ===== HEADER ===== -->
        <div class="header">
            <h1><i class="fas fa-plus-circle"></i>Deposit</h1>
            <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
        </div>

        <!-- ===== METHOD SELECTION ===== -->
        <div class="card">
            <div class="method-tabs">
                <button class="method-tab active" data-method="upi" onclick="selectMethod('upi')">
                    <i class="fas fa-mobile-alt"></i> UPI
                </button>
                <button class="method-tab" data-method="bkash" onclick="selectMethod('bkash')">
                    <i class="fas fa-credit-card"></i> Bkash
                </button>
                <button class="method-tab" data-method="usdt" onclick="selectMethod('usdt')">
                    <i class="fas fa-coins"></i> USDT
                </button>
            </div>

            <!-- ===== UPI FORM ===== -->
            <div id="upiForm">
                <div class="form-group">
                    <label>💳 Your UPI ID</label>
                    <input type="text" id="upiId" placeholder="username@okhdfcbank">
                </div>
                <div class="form-group">
                    <label>💰 Amount (INR)</label>
                    <input type="number" id="upiAmount" placeholder="Enter amount" min="100">
                </div>
                <div class="form-group">
                    <label>📝 Transaction ID</label>
                    <input type="text" id="upiTxnId" placeholder="Enter transaction ID">
                </div>
            </div>

            <!-- ===== BKASH FORM ===== -->
            <div id="bkashForm" style="display:none;">
                <div class="form-group">
                    <label>📱 Bkash Number</label>
                    <input type="tel" id="bkashNumber" placeholder="01XXXXXXXXX">
                </div>
                <div class="form-group">
                    <label>💰 Amount (BDT)</label>
                    <input type="number" id="bkashAmount" placeholder="Enter amount" min="100">
                </div>
                <div class="form-group">
                    <label>📝 Transaction ID</label>
                    <input type="text" id="bkashTxnId" placeholder="Enter transaction ID">
                </div>
            </div>

            <!-- ===== USDT FORM ===== -->
            <div id="usdtForm" style="display:none;">
                <div class="form-group">
                    <label>💰 Amount (USDT)</label>
                    <input type="number" id="usdtAmount" placeholder="Enter amount" min="10" step="0.01">
                </div>
                <div class="form-group">
                    <label>📝 Transaction ID</label>
                    <input type="text" id="usdtTxnId" placeholder="Enter transaction ID">
                </div>
            </div>

            <!-- ===== AMOUNT DISPLAY ===== -->
            <div class="amount-display">
                <div class="lbl">You will receive</div>
                <div class="amt" id="receiveAmount">₹0</div>
            </div>

            <div class="min-note">
                <i class="fas fa-info-circle"></i> Minimum deposit: ₹100 / 10 USDT
            </div>

            <button class="btn-submit" onclick="submitDeposit()">
                <i class="fas fa-paper-plane"></i> Submit Request
            </button>
        </div>

        <!-- ===== INSTRUCTION CARD ===== -->
        <div class="card" style="border-color:rgba(74,158,255,0.05);">
            <div style="display:flex;align-items:center;gap:10px;">
                <i class="fas fa-info-circle" style="color:#4a9eff;font-size:18px;"></i>
                <div>
                    <div style="font-size:12px;font-weight:600;color:rgba(255,255,255,0.4);">How it works</div>
                    <div style="font-size:10px;color:rgba(255,255,255,0.15);margin-top:2px;">
                        Send payment to the provided address and submit the transaction ID. Admin will verify and add balance.
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">REVO FIXER © 2026</div>
    </div>

    <script>
        // ============================================================
        // 🔥 FIREBASE CONFIG
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyCLz9LCMNsfb7tHJ2t-oocGjVD-nVox3GM",
            authDomain: "revo-fixer-45a26.firebaseapp.com",
            databaseURL: "https://revo-fixer-45a26-default-rtdb.firebaseio.com",
            projectId: "revo-fixer-45a26",
            storageBucket: "revo-fixer-45a26.firebasestorage.app",
            messagingSenderId: "496963115399",
            appId: "1:496963115399:web:d38ec404edff64dfecdb22"
        };

        // ============================================================
        // 🚀 FIREBASE INITIALIZE
        // ============================================================
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentMethod = 'upi';

        // ============================================================
        // 🔄 SELECT METHOD
        // ============================================================
        function selectMethod(method) {
            currentMethod = method;

            // Update tabs
            document.querySelectorAll('.method-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.method === method);
            });

            // Show/hide forms
            document.getElementById('upiForm').style.display = method === 'upi' ? 'block' : 'none';
            document.getElementById('bkashForm').style.display = method === 'bkash' ? 'block' : 'none';
            document.getElementById('usdtForm').style.display = method === 'usdt' ? 'block' : 'none';

            // Update receive amount label
            const symbols = { upi: '₹', bkash: '৳', usdt: '$' };
            document.querySelector('.amount-display .lbl').textContent = 'You will receive';
            document.getElementById('receiveAmount').textContent = symbols[method] + '0';

            // Update placeholder
            const labels = {
                upi: 'Enter amount (INR)',
                bkash: 'Enter amount (BDT)',
                usdt: 'Enter amount (USDT)'
            };
            const inputs = document.querySelectorAll('#upiAmount, #bkashAmount, #usdtAmount');
            inputs.forEach(input => input.placeholder = labels[method]);

            // Update min deposit note
            const minText = {
                upi: 'Minimum deposit: ₹100',
                bkash: 'Minimum deposit: ৳100',
                usdt: 'Minimum deposit: 10 USDT'
            };
            document.querySelector('.min-note').innerHTML = `<i class="fas fa-info-circle"></i> ${minText[method]}`;
        }

        // ============================================================
        // 💰 AMOUNT CALCULATE
        // ============================================================
        function calculateAmount() {
            let amount = 0;
            let symbol = '₹';

            if (currentMethod === 'upi') {
                amount = parseFloat(document.getElementById('upiAmount').value) || 0;
                symbol = '₹';
            } else if (currentMethod === 'bkash') {
                amount = parseFloat(document.getElementById('bkashAmount').value) || 0;
                symbol = '৳';
            } else if (currentMethod === 'usdt') {
                amount = parseFloat(document.getElementById('usdtAmount').value) || 0;
                symbol = '$';
            }

            document.getElementById('receiveAmount').textContent = symbol + amount.toLocaleString();
        }

        // Add event listeners for amount calculation
        document.querySelectorAll('#upiAmount, #bkashAmount, #usdtAmount').forEach(input => {
            input.addEventListener('input', calculateAmount);
        });

        // ============================================================
        // 📤 SUBMIT DEPOSIT
        // ============================================================
        function submitDeposit() {
            const userId = localStorage.getItem('userId');
            if (!userId) {
                alert('Please login first!');
                window.location.href = 'index.html';
                return;
            }

            let data = {
                method: currentMethod,
                userId: userId,
                status: 'pending',
                createdAt: Date.now()
            };

            if (currentMethod === 'upi') {
                const upiId = document.getElementById('upiId').value.trim();
                const amount = document.getElementById('upiAmount').value.trim();
                const txnId = document.getElementById('upiTxnId').value.trim();

                if (!upiId || !amount || !txnId) {
                    alert('Please fill all fields!');
                    return;
                }

                data.upiId = upiId;
                data.amount = parseFloat(amount);
                data.transactionId = txnId;
                data.currency = 'INR';

            } else if (currentMethod === 'bkash') {
                const number = document.getElementById('bkashNumber').value.trim();
                const amount = document.getElementById('bkashAmount').value.trim();
                const txnId = document.getElementById('bkashTxnId').value.trim();

                if (!number || !amount || !txnId) {
                    alert('Please fill all fields!');
                    return;
                }

                data.bkashNumber = number;
                data.amount = parseFloat(amount);
                data.transactionId = txnId;
                data.currency = 'BDT';

            } else if (currentMethod === 'usdt') {
                const amount = document.getElementById('usdtAmount').value.trim();
                const txnId = document.getElementById('usdtTxnId').value.trim();

                if (!amount || !txnId) {
                    alert('Please fill all fields!');
                    return;
                }

                data.amount = parseFloat(amount);
                data.transactionId = txnId;
                data.currency = 'USDT';
            }

            // Save to Firebase
            const btn = document.querySelector('.btn-submit');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting...';
            btn.disabled = true;

            db.ref('paymentRequests').push(data)
                .then(() => {
                    db.ref(`users/${userId}/activity`).push({
                        text: `💰 Deposit request submitted: ${data.amount} ${data.currency}`,
                        time: Date.now()
                    });

                    btn.innerHTML = '<i class="fas fa-check"></i> Submitted!';
                    btn.style.background = 'linear-gradient(135deg, #059669, #10b981)';

                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 2000);
                })
                .catch((error) => {
                    alert('Error: ' + error.message);
                    btn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit Request';
                    btn.disabled = false;
                });
        }

        // ============================================================
        // 🚀 INIT
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            selectMethod('upi');
            console.log('💰 Deposit page loaded!');
        });
    </script>

</body>
</html>
