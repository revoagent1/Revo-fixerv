<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Revo Fixer | Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        /* ===== আপনার আগের CSS ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: #f0ebe3;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            color: #1e1e2a;
            padding: 16px;
        }
        .card {
            background: rgba(255,255,255,0.45);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 20px;
            padding: 20px 18px;
            margin: 14px 0;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .header h1 { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .header h1 i { color: #6F8961; }
        .back-btn {
            background: rgba(255,255,255,0.4);
            border: 1px solid rgba(255,255,255,0.2);
            color: #888;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .profile-avatar { text-align: center; margin-bottom: 16px; }
        .profile-avatar .avatar {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6F8961, #C29E63);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 3px solid rgba(255,255,255,0.3);
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }
        .profile-avatar .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .profile-avatar .avatar .avatar-letter { font-size: 32px; font-weight: 700; color: #fff; }
        .profile-avatar .avatar .upload-overlay {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.5);
            padding: 4px 0;
            font-size: 8px;
            color: #fff;
            text-align: center;
            opacity: 0;
            transition: 0.3s;
        }
        .profile-avatar .avatar:hover .upload-overlay { opacity: 1; }
        .profile-avatar .name { font-size: 20px; font-weight: 700; margin-top: 8px; }
        .profile-avatar .id { font-size: 11px; color: #999; }
        .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,0.03); }
        .info-row:last-child { border-bottom: none; }
        .info-row .label { font-size: 12px; color: #999; }
        .info-row .value { font-size: 14px; font-weight: 600; word-break: break-all; max-width: 60%; text-align: right; }
        .info-row .value.green { color: #6F8961; }
        .info-row .value.blue { color: #4a9eff; }
        .btn-edit, .btn-logout {
            width: 100%; padding: 14px; border: none; border-radius: 14px;
            font-size: 13px; font-weight: 600; cursor: pointer;
            transition: 0.3s;
        }
        .btn-edit { background: linear-gradient(135deg, #6F8961, #C29E63); color: #fff; margin-top: 6px; }
        .btn-logout { background: transparent; border: 1px solid rgba(220,53,69,0.15); color: #dc3545; margin-top: 8px; }
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
            z-index: 9999; display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .modal.show { display: flex; }
        .modal-box {
            background: #fff; border-radius: 24px; padding: 32px 28px;
            max-width: 380px; width: 100%;
        }
        .modal-box h3 { font-size: 18px; font-weight: 700; text-align: center; margin-bottom: 16px; }
        .avatar-upload-section {
            text-align: center; padding: 16px;
            background: rgba(111,137,97,0.03); border-radius: 14px;
            border: 1px dashed rgba(111,137,97,0.08);
            margin: 16px 0;
        }
        .avatar-upload-section .preview {
            width: 64px; height: 64px; border-radius: 50%;
            overflow: hidden; margin: 0 auto 10px;
            border: 2px solid rgba(111,137,97,0.08);
        }
        .avatar-upload-section .preview img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .avatar-upload-section .preview .letter {
            width: 100%; height: 100%; display: flex;
            align-items: center; justify-content: center;
            font-size: 24px; font-weight: 700; color: #6F8961;
        }
        .upload-btn {
            padding: 6px 16px; background: rgba(111,137,97,0.05);
            border: 1px solid rgba(111,137,97,0.08);
            border-radius: 8px; color: #6F8961;
            font-size: 11px; font-weight: 600; cursor: pointer;
        }
        .form-group { margin-bottom: 16px; }
        .form-group label { font-size: 10px; font-weight: 600; color: #999; display: block; margin-bottom: 6px; }
        .form-group input {
            width: 100%; padding: 14px 16px;
            background: rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.04);
            border-radius: 14px; font-size: 14px; outline: none;
        }
        .btn-group { display: flex; gap: 10px; }
        .btn-group button {
            flex: 1; padding: 12px; border: none; border-radius: 12px;
            font-size: 13px; font-weight: 600; cursor: pointer;
        }
        .btn-save { background: linear-gradient(135deg, #6F8961, #C29E63); color: #fff; }
        .btn-cancel { background: rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.04); color: #888; }
        .footer { text-align: center; margin-top: 18px; font-size: 8px; color: #ccc; }
        ::-webkit-scrollbar { width: 0; background: transparent; }
        @media (max-width: 400px) {
            .card { padding: 16px 14px; }
            .profile-avatar .avatar { width: 64px; height: 64px; }
            .header h1 { font-size: 17px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fas fa-user-circle"></i>Profile</h1>
        <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
    </div>

    <div class="card">
        <div class="profile-avatar">
            <div class="avatar" onclick="document.getElementById('avatarInput').click()">
                <img id="profileAvatarImg" src="" alt="Profile" style="display:none;">
                <span class="avatar-letter" id="avatarLetter">R</span>
                <div class="upload-overlay"><i class="fas fa-camera"></i> Change</div>
            </div>
            <div class="name" id="profileName">User</div>
            <div class="id" id="profileId">---</div>
        </div>

        <div class="info-row">
            <span class="label">🔑 License Key</span>
            <span class="value blue" id="profileLicenseKey">--- <i class="fas fa-copy copy-key" style="font-size:10px;color:#6F8961;cursor:pointer;margin-left:6px;" onclick="copyLicenseKey()"></i></span>
        </div>
        <div class="info-row">
            <span class="label">💰 Balance</span>
            <span class="value green" id="profileBalance">₹0</span>
        </div>
        <div class="info-row">
            <span class="label">📦 Package</span>
            <span class="value blue" id="profilePackage">No Active Package</span>
        </div>
        <div class="info-row">
            <span class="label">📅 Joined</span>
            <span class="value" id="profileJoined">---</span>
        </div>
    </div>

    <button class="btn-edit" onclick="openEditModal()"><i class="fas fa-pen"></i> Edit Profile</button>
    <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>

    <div class="footer">REVO FIXER © 2026</div>

    <!-- ===== MODAL ===== -->
    <div class="modal" id="editModal">
        <div class="modal-box">
            <h3>✏️ Edit Profile</h3>

            <div class="avatar-upload-section">
                <div class="preview">
                    <img id="modalAvatarImg" src="" alt="Avatar">
                    <div class="letter" id="modalAvatarLetter">R</div>
                </div>
                <button class="upload-btn" onclick="document.getElementById('avatarInput').click()">
                    <i class="fas fa-upload"></i> Choose Picture
                </button>
                <div style="font-size:10px;margin-top:6px;color:#6F8961;display:none;" id="uploadStatus">
                    <i class="fas fa-spinner fa-spin"></i> Uploading...
                </div>
                <input type="file" id="avatarInput" accept="image/*" style="display:none;" onchange="uploadAvatar(this.files[0])">
            </div>

            <div class="form-group">
                <label>👤 Username</label>
                <input type="text" id="editUsername" placeholder="Enter username">
            </div>

            <div class="btn-group">
                <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
                <button class="btn-save" onclick="saveProfile()">Save</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // 🔥 FIREBASE CONFIG
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyCLz9LCMNsfb7tHJ2t-oocGjVD-nVox3GM",
            authDomain: "revo-fixer-45a26.firebaseapp.com",
            databaseURL: "https://revo-fixer-45a26-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "revo-fixer-45a26",
            storageBucket: "revo-fixer-45a26.firebasestorage.app",
            messagingSenderId: "496963115399",
            appId: "1:496963115399:web:d38ec404edff64dfecdb22"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ============================================================
        // ☁️ CLOUDINARY CONFIG
        // ============================================================
        const CLOUDINARY = {
            cloudName: 'dw72p48ir',
            uploadPreset: 'darkblaise_uploads',
            folder: 'revo-fixer-payments'
        };

        // ============================================================
        // 📤 CLOUDINARY UPLOAD FUNCTION
        // ============================================================
        async function uploadToCloudinary(file, subFolder = '') {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', CLOUDINARY.uploadPreset);
            
            const folderPath = subFolder ? `${CLOUDINARY.folder}/${subFolder}` : CLOUDINARY.folder;
            formData.append('folder', folderPath);

            const response = await fetch(
                `https://api.cloudinary.com/v1_1/${CLOUDINARY.cloudName}/image/upload`,
                { method: 'POST', body: formData }
            );
            const data = await response.json();
            if (data.error) throw new Error(data.error.message);
            return data.secure_url;
        }

        // ============================================================
        // 👤 USER INFO
        // ============================================================
        let userId = localStorage.getItem('userId');
        let licenseKey = localStorage.getItem('licenseKey') || '';

        // ============================================================
        // 📤 UPLOAD AVATAR
        // ============================================================
        async function uploadAvatar(file) {
            if (!file) return;
            if (file.size > 2 * 1024 * 1024) { alert('File size must be less than 2MB!'); return; }
            if (!file.type.startsWith('image/')) { alert('Please select an image file!'); return; }

            const status = document.getElementById('uploadStatus');
            status.style.display = 'block';
            status.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';
            status.style.color = '#6F8961';

            try {
                const imageUrl = await uploadToCloudinary(file, 'avatars');
                await db.ref(`users/${userId}/avatarImage`).set(imageUrl);
                updateAvatarUI(imageUrl);
                status.innerHTML = '<i class="fas fa-check-circle"></i> Uploaded!';
                setTimeout(() => { status.style.display = 'none'; }, 2000);
                alert('✅ Avatar uploaded successfully!');
            } catch (error) {
                status.innerHTML = '❌ ' + error.message;
                status.style.color = '#dc3545';
                setTimeout(() => { status.style.display = 'none'; }, 3000);
            }
        }

        function updateAvatarUI(url) {
            document.getElementById('profileAvatarImg').src = url;
            document.getElementById('profileAvatarImg').style.display = 'block';
            document.getElementById('avatarLetter').style.display = 'none';
            document.getElementById('modalAvatarImg').src = url;
            document.getElementById('modalAvatarImg').style.display = 'block';
            document.getElementById('modalAvatarLetter').style.display = 'none';
        }

        function copyLicenseKey() {
            const key = document.getElementById('profileLicenseKey').textContent.replace('📋 Copy', '').trim();
            if (!key || key === '---') { alert('No license key found!'); return; }
            navigator.clipboard.writeText(key).then(() => alert('✅ License key copied!'));
        }

        function loadProfile() {
            if (!userId) { window.location.href = 'index.html'; return; }
            db.ref('users/' + userId).on('value', (snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    document.getElementById('profileName').textContent = data.username || 'User';
                    document.getElementById('avatarLetter').textContent = (data.username || 'U').charAt(0).toUpperCase();
                    document.getElementById('modalAvatarLetter').textContent = (data.username || 'U').charAt(0).toUpperCase();
                    if (data.avatarImage) updateAvatarUI(data.avatarImage);
                    document.getElementById('profileId').textContent = userId.substring(0, 16) + '...';
                    document.getElementById('profileLicenseKey').innerHTML = (licenseKey || data.licenseKey || '---') + ' <i class="fas fa-copy copy-key" style="font-size:10px;color:#6F8961;cursor:pointer;margin-left:6px;" onclick="copyLicenseKey()"></i>';
                    document.getElementById('profileBalance').textContent = '₹' + (data.balance || 0).toLocaleString();
                    document.getElementById('profilePackage').textContent = data.package?.name || 'No Active Package';
                    if (data.createdAt) {
                        document.getElementById('profileJoined').textContent = new Date(data.createdAt).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
                    }
                    document.getElementById('editUsername').value = data.username || '';
                }
            });
        }

        function openEditModal() {
            const img = document.getElementById('profileAvatarImg');
            if (img.style.display !== 'none' && img.src) {
                document.getElementById('modalAvatarImg').src = img.src;
                document.getElementById('modalAvatarImg').style.display = 'block';
                document.getElementById('modalAvatarLetter').style.display = 'none';
            }
            document.getElementById('editModal').classList.add('show');
        }

        function closeEditModal() { document.getElementById('editModal').classList.remove('show'); }

        async function saveProfile() {
            const username = document.getElementById('editUsername').value.trim();
            if (!username) { alert('Please enter a username!'); return; }
            try {
                await db.ref('users/' + userId).update({ username: username });
                await db.ref('users/' + userId + '/activity').push({ text: '✏️ Profile updated', time: Date.now() });
                closeEditModal();
                alert('✅ Profile updated successfully!');
            } catch (error) { alert('❌ Error: ' + error.message); }
        }

        function logout() {
            if (!confirm('Are you sure you want to logout?')) return;
            localStorage.clear();
            window.location.href = 'index.html';
        }

        document.addEventListener('DOMContentLoaded', loadProfile);
    </script>

</body>
</html>
