<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Revo Fixer | Crazy Time Live</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0b14;
            --card: #141827;
            --border: #1e2240;
            --input: #0d1020;
            --blue: #448AFF;
            --text: #ffffff;
            --text2: #bcc6e0;
            --text3: #8899cc;
            --text4: #5a6a99;
            --green: #2ed573;
            --red: #ff4757;
            --gold: #FFD700;
            --orange: #ffa502;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            padding-bottom: 30px;
        }

        .header {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .back-btn {
            background: rgba(68,138,255,0.1);
            border: 1px solid rgba(68,138,255,0.2);
            color: var(--blue);
            width: 38px;
            height: 38px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.15s;
        }
        .back-btn:active {
            transform: scale(0.92);
        }
        .header h1 {
            font-size: 16px;
            font-weight: 800;
        }
        .header h1 span {
            color: var(--blue);
        }

        .auto-refresh-timer {
            position: fixed;
            top: 16px;
            right: 16px;
            background: rgba(68,138,255,0.12);
            backdrop-filter: blur(10px);
            color: var(--blue);
            padding: 8px 14px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid rgba(68,138,255,0.2);
            z-index: 1000;
            display: none;
        }

        .watermark {
            position: fixed;
            bottom: 12px;
            right: 14px;
            color: rgba(255,255,255,0.06);
            font-size: 9px;
            z-index: 100;
        }
        .watermark a {
            color: rgba(255,255,255,0.15);
            text-decoration: none;
        }

        .container {
            max-width: 550px;
            margin: 0 auto;
            padding: 16px;
        }

        .hero-section {
            text-align: center;
            margin-bottom: 16px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 18px;
        }
        .hero-section h1 {
            font-size: 20px;
            font-weight: 800;
        }
        .hero-section h1 span {
            color: var(--blue);
        }
        .hero-section p {
            font-size: 11px;
            color: var(--text3);
            margin-top: 4px;
        }

        .signal-container {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px 18px;
            margin-bottom: 16px;
        }

        .signal-label {
            text-align: center;
            color: var(--blue);
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .signal-time {
            color: var(--text3);
            margin-left: 6px;
        }

        .live-display {
            min-height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .placeholder-box {
            text-align: center;
            padding: 36px;
            background: rgba(68,138,255,0.03);
            border-radius: 20px;
            width: 100%;
            border: 1px dashed var(--border);
        }
        .placeholder-box i {
            font-size: 44px;
            color: var(--blue);
            margin-bottom: 12px;
            opacity: 0.4;
        }
        .placeholder-box .main-text {
            color: var(--blue);
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .placeholder-box .sub-text {
            color: var(--text4);
            font-size: 12px;
        }

        .signal-card {
            width: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            animation: shake 2.5s ease-in-out infinite, blink 1.2s ease-in-out infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            10% { transform: translate(-2px, -1px) rotate(-1deg); }
            20% { transform: translate(2px, 1px) rotate(1deg); }
            30% { transform: translate(-1px, 1px) rotate(-0.5deg); }
            40% { transform: translate(1px, -1px) rotate(0.5deg); }
            50% { transform: translate(-1px, 1px) rotate(-0.3deg); }
            60% { transform: translate(1px, -1px) rotate(0.3deg); }
            70% { transform: translate(0, 0) rotate(0deg); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; filter: drop-shadow(0 0 12px rgba(68,138,255,0.4)); }
            50% { opacity: 0.85; filter: drop-shadow(0 0 25px rgba(68,138,255,0.7)); }
        }

        .signal-image-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .signal-image {
            width: 240px;
            height: 120px;
            object-fit: contain;
            transition: all 0.3s;
        }
        .signal-name {
            font-size: 24px;
            font-weight: 800;
            color: var(--gold);
            margin-top: 12px;
            text-shadow: 0 0 15px rgba(255,215,0,0.25);
        }

        .confidence-display {
            margin-top: 16px;
            width: 100%;
        }
        .confidence-text {
            font-size: 11px;
            color: var(--text3);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .confidence-text i {
            color: var(--blue);
        }
        .confidence-bar {
            width: 100%;
            height: 4px;
            background: var(--input);
            border-radius: 10px;
            overflow: hidden;
        }
        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--blue), #2962FF);
            width: 0%;
            transition: width 0.8s ease;
            border-radius: 10px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--blue), #2962FF);
            color: #fff;
            box-shadow: 0 4px 15px rgba(68,138,255,0.25);
        }
        .btn-secondary {
            background: var(--input);
            border: 1px solid var(--border);
            color: var(--text2);
        }

        .stats-container {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 14px 16px;
        }
        .stats-grid {
            display: flex;
            justify-content: space-between;
            gap: 8px;
        }
        .stat-item {
            text-align: center;
            flex: 1;
        }
        .stat-value {
            font-size: 18px;
            font-weight: 800;
            color: var(--blue);
            margin-bottom: 2px;
        }
        .stat-label {
            font-size: 9px;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .loading-spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(68,138,255,0.15);
            border-top: 3px solid var(--blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 16px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            z-index: 9999;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
        }
        .toast-success {
            background: var(--green);
            color: white;
        }
        .toast-error {
            background: var(--red);
            color: white;
        }

        @media (max-width: 480px) {
            .container { padding: 12px; }
            .signal-image { width: 200px; height: 100px; }
            .signal-name { font-size: 20px; }
            .stat-value { font-size: 15px; }
            .hero-section h1 { font-size: 17px; }
            .signal-container { padding: 18px 14px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i></button>
        <h1><span>CRAZY TIME</span> LIVE</h1>
    </div>

    <div class="auto-refresh-timer" id="autoRefreshTimer">
        <i class="fas fa-sync-alt fa-spin"></i> Next: 60s
    </div>

    <div class="toast" id="toast"></div>

    <div class="watermark">
        Developer <a href="https://t.me/RevoAgent" target="_blank">@RevoAgent</a>
    </div>

    <div class="container">
        <div class="hero-section">
            <h1><span>CRAZY TIME</span> REVO FIXER</h1>
            <p>⚡ Live Predictions • High Accuracy ⚡</p>
        </div>

        <div class="signal-container">
            <div class="signal-label">
                <i class="fas fa-bolt"></i> CURRENT PREDICTION
                <span class="signal-time" id="signalTime"></span>
            </div>

            <div class="live-display" id="liveDisplay">
                <div id="placeholderBox" class="placeholder-box">
                    <i class="fas fa-hand-pointer"></i>
                    <div class="main-text">Click Get Signal To Start Live Session</div>
                    <div class="sub-text">Get instant predictions</div>
                </div>

                <div id="signalCard" class="signal-card">
                    <div class="signal-image-container">
                        <img id="signalImage" class="signal-image" src="" alt="Signal">
                        <div class="signal-name" id="signalName"></div>
                    </div>
                </div>
            </div>

            <div class="confidence-display">
                <div class="confidence-text" id="confidenceText">
                    <i class="fas fa-chart-line"></i> AI Confidence: 0%
                </div>
                <div class="confidence-bar">
                    <div class="confidence-fill" id="confidenceFill"></div>
                </div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-primary" id="predictBtn" onclick="generatePrediction()">
                <i class="fas fa-magic"></i> GET SIGNAL
            </button>
            <button class="btn btn-secondary" id="refreshBtn" onclick="refreshPrediction()">
                <i class="fas fa-sync-alt"></i> REFRESH
            </button>
        </div>

        <div class="stats-container">
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="totalPredictions">1,249</div>
                    <div class="stat-label">TOTAL</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="accuracy">94%</div>
                    <div class="stat-label">ACCURACY</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="bonusHits">128</div>
                    <div class="stat-label">BONUS</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="liveUsers">1.2k</div>
                    <div class="stat-label">LIVE</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // 🎮 GAME IMAGES
        // ============================================================
        const gameImages = {
            '1': 'https://res.cloudinary.com/dw72p48ir/image/upload/v1773539269/one-card_r0ffuy.png',
            '2': 'https://res.cloudinary.com/dw72p48ir/image/upload/v1773539364/two-card_ayl9lu.png',
            '5': 'https://res.cloudinary.com/dw72p48ir/image/upload/v1773539403/five-card_msp0cr.png',
            '10': 'https://res.cloudinary.com/dw72p48ir/image/upload/v1773539416/ten-card_cx3cvj.png',
            'PACHINKO': 'https://res.cloudinary.com/dw72p48ir/image/upload/v1773539441/pachiko-card_zxiw7r.png',
            'COIN FLIP': 'https://res.cloudinary.com/dw72p48ir/image/upload/v1773539429/coin-flip-card_kbbg7m.png',
            'CASH HUNT': 'https://res.cloudinary.com/dw72p48ir/image/upload/v1773539519/cash-hunt-card_jp8hr3.png',
            'CRAZY TIME': 'https://res.cloudinary.com/dw72p48ir/image/upload/v1773539531/crazy-time-card_dftfw3.png'
        };

        // ============================================================
        // 🎮 GAME DATA
        // ============================================================
        const games = [
            { name: '1', imageKey: '1', confidenceRange: [85, 95] },
            { name: '2', imageKey: '2', confidenceRange: [80, 92] },
            { name: '5', imageKey: '5', confidenceRange: [75, 90] },
            { name: '10', imageKey: '10', confidenceRange: [70, 88] },
            { name: 'PACHINKO', imageKey: 'PACHINKO', confidenceRange: [60, 85] },
            { name: 'COIN FLIP', imageKey: 'COIN FLIP', confidenceRange: [68, 89] },
            { name: 'CASH HUNT', imageKey: 'CASH HUNT', confidenceRange: [65, 87] },
            { name: 'CRAZY TIME', imageKey: 'CRAZY TIME', confidenceRange: [55, 82] }
        ];

        // ============================================================
        // 📊 STATS
        // ============================================================
        let stats = {
            total: 1249,
            accuracy: 94,
            bonusHits: 128,
            liveUsers: 1247
        };

        let autoRefreshInterval = null;
        let autoRefreshCountdown = 60;
        let isTimerRunning = false;

        // ============================================================
        // 🎯 DOM ELEMENTS
        // ============================================================
        const placeholderBox = document.getElementById('placeholderBox');
        const signalCard = document.getElementById('signalCard');
        const signalImage = document.getElementById('signalImage');
        const signalName = document.getElementById('signalName');
        const confidenceText = document.getElementById('confidenceText');
        const confidenceFill = document.getElementById('confidenceFill');
        const predictBtn = document.getElementById('predictBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const autoRefreshTimer = document.getElementById('autoRefreshTimer');
        const signalTime = document.getElementById('signalTime');

        // ============================================================
        // 🔙 GO BACK
        // ============================================================
        function goBack() {
            window.location.href = 'activation.html';
        }

        // ============================================================
        // ⏱️ UPDATE TIME
        // ============================================================
        function updateTime() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            signalTime.textContent = `• ${hours}:${minutes}`;
        }

        // ============================================================
        // 🔄 AUTO REFRESH
        // ============================================================
        function startAutoRefresh() {
            if (isTimerRunning && autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
            }
            autoRefreshCountdown = 60;
            autoRefreshTimer.style.display = 'block';
            isTimerRunning = true;

            autoRefreshInterval = setInterval(() => {
                autoRefreshCountdown--;
                autoRefreshTimer.innerHTML = `<i class="fas fa-sync-alt fa-spin"></i> Next: ${autoRefreshCountdown}s`;
                if (autoRefreshCountdown <= 0) {
                    generatePrediction();
                    autoRefreshCountdown = 60;
                }
            }, 1000);
        }

        function stopAutoRefresh() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
            }
            autoRefreshTimer.style.display = 'none';
            isTimerRunning = false;
        }

        // ============================================================
        // 🔄 RESET DISPLAY
        // ============================================================
        function resetDisplay() {
            placeholderBox.style.display = 'block';
            signalCard.style.display = 'none';
            confidenceText.innerHTML = '<i class="fas fa-chart-line"></i> AI Confidence: 0%';
            confidenceFill.style.width = '0%';
        }

        // ============================================================
        // 📊 SHOW PREDICTION - FIXED
        // ============================================================
        function showPrediction(game, confidence) {
            console.log('🎯 Showing prediction:', game, confidence);
            
            const imageUrl = gameImages[game.imageKey];
            if (imageUrl) {
                signalImage.src = imageUrl;
                signalImage.style.display = 'block';
                placeholderBox.style.display = 'none';
                signalCard.style.display = 'flex';
                signalName.textContent = game.name;
                
                // ✅ Store in localStorage for persistence
                localStorage.setItem('lastSignal', JSON.stringify({
                    game: game,
                    confidence: confidence,
                    time: Date.now()
                }));
                
                console.log('✅ Signal displayed:', game.name);
            } else {
                console.error('❌ Image not found for:', game.imageKey);
            }
            
            confidenceText.innerHTML = `<i class="fas fa-chart-line"></i> AI Confidence: ${confidence}%`;
            confidenceFill.style.width = confidence + '%';
        }

        // ============================================================
        // 🎯 GENERATE PREDICTION - FIXED
        // ============================================================
        function generatePrediction() {
            console.log('🎯 Generating prediction...');
            
            predictBtn.disabled = true;
            refreshBtn.disabled = true;

            // Show loading
            placeholderBox.innerHTML = `
                <div class="loading-spinner"></div>
                <div class="main-text">Analyzing Patterns...</div>
                <div class="sub-text">Please wait</div>
            `;
            placeholderBox.style.display = 'block';
            signalCard.style.display = 'none';
            confidenceText.innerHTML = '<i class="fas fa-spinner fa-spin"></i> CALCULATING...';
            confidenceFill.style.width = '0%';

            updateTime();

            if (!isTimerRunning) {
                startAutoRefresh();
            } else {
                if (autoRefreshInterval) clearInterval(autoRefreshInterval);
                startAutoRefresh();
            }

            // Simulate processing
            setTimeout(() => {
                // Random selection
                const rand = Math.random();
                let selectedGame;
                if (rand < 0.22) selectedGame = games.find(g => g.name === '1');
                else if (rand < 0.42) selectedGame = games.find(g => g.name === '2');
                else if (rand < 0.60) selectedGame = games.find(g => g.name === '5');
                else if (rand < 0.75) selectedGame = games.find(g => g.name === '10');
                else if (rand < 0.85) selectedGame = games.find(g => g.name === 'PACHINKO');
                else if (rand < 0.92) selectedGame = games.find(g => g.name === 'COIN FLIP');
                else if (rand < 0.97) selectedGame = games.find(g => g.name === 'CASH HUNT');
                else selectedGame = games.find(g => g.name === 'CRAZY TIME');

                const confidence = Math.floor(Math.random() * (selectedGame.confidenceRange[1] - selectedGame.confidenceRange[0] + 1)) + selectedGame.confidenceRange[0];

                // Show prediction
                showPrediction(selectedGame, confidence);

                // Update stats
                stats.total += 1;
                if (['PACHINKO', 'COIN FLIP', 'CASH HUNT', 'CRAZY TIME'].includes(selectedGame.name)) {
                    stats.bonusHits += 1;
                }
                const accuracyChange = Math.random() > 0.7 ? -1 : 1;
                stats.accuracy = Math.max(85, Math.min(98, stats.accuracy + accuracyChange));

                document.getElementById('totalPredictions').textContent = stats.total.toLocaleString();
                document.getElementById('accuracy').textContent = stats.accuracy + '%';
                document.getElementById('bonusHits').textContent = stats.bonusHits;
                document.getElementById('liveUsers').textContent = (stats.liveUsers / 1000).toFixed(1) + 'k';

                predictBtn.disabled = false;
                refreshBtn.disabled = false;
                
                console.log('✅ Prediction generated successfully!');
            }, 2000);
        }

        // ============================================================
        // 🔄 REFRESH PREDICTION
        // ============================================================
        function refreshPrediction() {
            console.log('🔄 Refreshing prediction...');
            resetDisplay();
            placeholderBox.innerHTML = `
                <i class="fas fa-hand-pointer"></i>
                <div class="main-text">Click Get Signal To Start Live Session</div>
                <div class="sub-text">Get instant predictions</div>
            `;
            stopAutoRefresh();
            
            // ✅ Clear stored signal
            localStorage.removeItem('lastSignal');
            
            setTimeout(() => generatePrediction(), 300);
        }

        // ============================================================
        // 💬 TOAST
        // ============================================================
        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast ' + (isError ? 'toast-error' : 'toast-success') + ' show';
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ============================================================
        // 🔄 LOAD LAST SIGNAL (Page Refresh)
        // ============================================================
        function loadLastSignal() {
            const saved = localStorage.getItem('lastSignal');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    const elapsed = Date.now() - data.time;
                    // Only show if less than 5 minutes old
                    if (elapsed < 5 * 60 * 1000) {
                        console.log('📦 Loading saved signal:', data.game);
                        showPrediction(data.game, data.confidence);
                        return true;
                    } else {
                        console.log('⏰ Saved signal expired');
                        localStorage.removeItem('lastSignal');
                    }
                } catch (e) {
                    console.error('❌ Error loading saved signal:', e);
                    localStorage.removeItem('lastSignal');
                }
            }
            return false;
        }

        // ============================================================
        // 🚀 INIT
        // ============================================================
        resetDisplay();
        updateTime();
        setInterval(updateTime, 1000);

        // ✅ Load last signal on page load
        const hasSignal = loadLastSignal();
        if (hasSignal) {
            console.log('✅ Loaded previous signal');
        }

        // Live users update
        setInterval(() => {
            const change = Math.floor(Math.random() * 20) - 10;
            stats.liveUsers = Math.max(1000, stats.liveUsers + change);
            document.getElementById('liveUsers').textContent = (stats.liveUsers / 1000).toFixed(1) + 'k';
        }, 8000);

        // Visibility change - pause/resume auto refresh
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                if (autoRefreshInterval) clearInterval(autoRefreshInterval);
            } else {
                if (isTimerRunning) startAutoRefresh();
            }
        });

        // Button event listeners
        predictBtn.addEventListener('click', generatePrediction);
        refreshBtn.addEventListener('click', refreshPrediction);
    </script>
</body>
</html>
